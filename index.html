<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Akademik Terintegrasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; color: #333; }
        .app-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); color: white; padding: 2rem 0; border-radius: 0 0 1.5rem 1.5rem; margin-bottom: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .profile-icon { font-size: 3rem; color: #0d6efd; background: #e9f2ff; border-radius: 50%; width: 80px; height: 80px; display: inline-flex; align-items: center; justify-content: center; }
        .scrollable-list { max-height: 400px; overflow-y: auto; }
        .list-group-item { border: none; border-bottom: 1px solid #f0f0f0; padding: 1rem 0.5rem; }
        .nav-pills .nav-link { border-radius: 50px; color: #555; font-weight: 500; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        #loading { display: flex; justify-content: center; align-items: center; height: 40vh; flex-direction: column; }
    </style>
</head>
<body>

<div class="app-header text-center">
    <div class="container">
        <h2 class="fw-bold mb-0"><i class="bi bi-mortarboard-fill me-2"></i>Portal Data Dosen</h2>
        <p class="mb-0 text-white-50">Arsip Otomatis Serverless GitHub</p>
    </div>
</div>

<div class="container pb-5">
    <div id="loading">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-3 text-muted fw-medium">Membaca arsip data...</p>
    </div>

    <div id="data-container" style="display: none;">
        <div class="row justify-content-center mb-4">
            <div class="col-lg-8">
                <div class="card p-4">
                    <div class="d-flex align-items-center flex-wrap gap-4">
                        <div class="profile-icon"><i class="bi bi-person-fill"></i></div>
                        <div class="flex-grow-1">
                            <h3 id="nama" class="fw-bold mb-1 text-primary">-</h3>
                            <div class="text-muted mb-2"><i class="bi bi-building me-1"></i> <span id="pt"></span></div>
                            <div class="d-flex flex-wrap gap-2 mt-3">
                                <span class="badge bg-light text-dark border"><i class="bi bi-book me-1"></i> <span id="prodi"></span></span>
                                <span class="badge bg-light text-dark border"><i class="bi bi-upc-scan me-1"></i> NIDN: <span id="nidn"></span></span>
                            </div>
                        </div>
                        <div>
                            <button onclick="fetchData()" class="btn btn-outline-secondary rounded-pill">
                                <i class="bi bi-arrow-clockwise me-1"></i> Refresh Tampilan
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab" role="tablist">
                    <li class="nav-item"><button class="nav-link active" id="pills-penelitian-tab" data-bs-toggle="pill" data-bs-target="#pills-penelitian" type="button" role="tab">Penelitian</button></li>
                    <li class="nav-item"><button class="nav-link" id="pills-pengabdian-tab" data-bs-toggle="pill" data-bs-target="#pills-pengabdian" type="button" role="tab">Pengabdian</button></li>
                    <li class="nav-item"><button class="nav-link" id="pills-publikasi-tab" data-bs-toggle="pill" data-bs-target="#pills-publikasi" type="button" role="tab">Publikasi</button></li>
                </ul>

                <div class="card">
                    <div class="card-body p-4">
                        <div class="tab-content" id="pills-tabContent">
                            <div class="tab-pane fade show active" id="pills-penelitian" role="tabpanel"><div class="scrollable-list"><ul id="list-penelitian" class="list-group list-group-flush"></ul></div></div>
                            <div class="tab-pane fade" id="pills-pengabdian" role="tabpanel"><div class="scrollable-list"><ul id="list-pengabdian" class="list-group list-group-flush"></ul></div></div>
                            <div class="tab-pane fade" id="pills-publikasi" role="tabpanel"><div class="scrollable-list"><ul id="list-publikasi" class="list-group list-group-flush"></ul></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('data-container').style.display = 'none';
        
        try {
            // MEMBACA DARI FILE data.json YANG DIHASILKAN GITHUB ACTIONS
            const response = await fetch('./data.json?t=' + new Date().getTime()); 
            const data = await response.json();
            
            if (data.status === 'success') {
                document.getElementById('nama').innerText = data.profil.nama || '-';
                document.getElementById('pt').innerText = data.profil.nama_pt || '-';
                document.getElementById('prodi').innerText = data.profil.nama_prodi || '-';
                document.getElementById('nidn').innerText = data.profil.nidn || '-';
                
                const renderList = (elementId, arrayData, keyText, keySub, badgeClass) => {
                    const ul = document.getElementById(elementId);
                    ul.innerHTML = '';
                    if (!arrayData || arrayData.length === 0) {
                        ul.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-inbox fs-1 d-block mb-2 text-light"></i>Belum ada data terdaftar.</div>';
                        return;
                    }
                    arrayData.forEach(item => {
                        ul.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-start gap-3"><div class="ms-2 me-auto"><div class="fw-medium text-dark">${item[keyText]}</div></div><span class="badge ${badgeClass} rounded-pill mt-1">${item[keySub]}</span></li>`;
                    });
                };

                renderList('list-penelitian', data.penelitian, 'judul', 'tahun', 'bg-primary');
                renderList('list-pengabdian', data.pengabdian, 'judul', 'tahun', 'bg-success');
                renderList('list-publikasi', data.publikasi, 'judul', 'jenis', 'bg-info text-dark');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('data-container').style.display = 'block';
            } else {
                alert(data.pesan || "Data kosong. Silakan jalankan GitHub Actions terlebih dahulu.");
                document.getElementById('loading').style.display = 'none';
            }
        } catch (error) {
            // Pesan jika data.json belum terbentuk di awal push
            document.getElementById('loading').innerHTML = '<p class="text-danger">File data.json belum dibuat oleh GitHub Actions. Harap tunggu atau jalankan workflow manual.</p>';
        }
    }
    window.onload = fetchData;
</script>
</body>
</html>
