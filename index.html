<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profil Akademik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            color: #1e293b;
        }
        .app-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: white;
            padding: 2.5rem 0;
            border-radius: 0 0 2rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(30, 58, 138, 0.2);
        }
        .card-profile {
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            margin-top: -2rem;
            position: relative;
            z-index: 10;
        }
        .profile-avatar {
            font-size: 2.5rem;
            color: #2563eb;
            background: #eff6ff;
            border-radius: 12px;
            width: 70px;
            height: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .stat-box {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 0.75rem 1.2rem;
            text-align: center;
            min-width: 120px;
            border: 1px solid #e2e8f0;
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .card-data {
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
            height: 100%;
        }
        .card-data-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f1f5f9;
        }
        .scrollable-content {
            max-height: 480px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .scrollable-content::-webkit-scrollbar { width: 5px; }
        .scrollable-content::-webkit-scrollbar-track { background: transparent; }
        .scrollable-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .data-item {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s ease;
        }
        .data-item:last-child { border-bottom: none; }
        .data-item:hover { background: #f8fafc; border-radius: 8px; }
        
        #loading { 
            display: flex; justify-content: center; align-items: center; 
            height: 50vh; flex-direction: column; 
        }
    </style>
</head>
<body>

<div class="app-header text-center">
    <div class="container">
        <h2 class="fw-bold mb-1"><i class="bi bi-shield-check me-2"></i>Dashboard Portofolio Dosen</h2>
        <p class="mb-0 text-white-50 fs-6 fw-medium">Sinkronisasi Data Otomatis & Terintegrasi</p>
    </div>
</div>

<div class="container pb-5">
    <div id="loading">
        <div class="spinner-border text-primary" role="status" style="width: 2.5rem; height: 2.5rem;"></div>
        <p class="mt-3 text-muted fw-medium fs-6">Sinkronisasi arsip data...</p>
    </div>

    <div id="data-container" style="display: none;">
        
        <div class="card card-profile p-4 mb-4">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-4">
                <div class="d-flex align-items-center gap-3 flex-wrap">
                    <div class="profile-avatar">
                        <i class="bi bi-person-badge-fill"></i>
                    </div>
                    <div>
                        <h4 id="nama" class="fw-bold mb-1 text-dark">-</h4>
                        <div class="text-muted small fw-medium mb-2">
                            <i class="bi bi-building me-1"></i><span id="pt"></span>
                        </div>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="badge bg-blue text-primary bg-opacity-10 border border-primary border-opacity-20 px-2 py-1.5 rounded-pill small"><i class="bi bi-tags-fill me-1"></i> <span id="prodi"></span></span>
                            <span class="badge bg-secondary text-dark bg-opacity-10 border border-secondary border-opacity-20 px-2 py-1.5 rounded-pill small"><i class="bi bi-hash me-1"></i> NIDN: <span id="nidn"></span></span>
                        </div>
                    </div>
                </div>
                
                <div class="d-flex gap-3">
                    <div class="stat-box">
                        <div id="count-pengabdian" class="stat-number">0</div>
                        <div class="stat-label">Pengabdian</div>
                    </div>
                    <div class="stat-box">
                        <div id="count-publikasi" class="stat-number">0</div>
                        <div class="stat-label">Publikasi</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card card-data p-4">
                    <h5 class="card-data-title text-success">
                        <i class="bi bi-people-fill text-success"></i> Pengabdian Masyarakat
                    </h5>
                    <div class="scrollable-content mt-2">
                        <div id="list-pengabdian"></div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card card-data p-4">
                    <h5 class="card-data-title text-primary">
                        <i class="bi bi-journal-bookmark-fill text-primary"></i> Karya Ilmiah & Publikasi
                    </h5>
                    <div class="scrollable-content mt-2">
                        <div id="list-publikasi"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <button onclick="fetchData()" class="btn btn-sm btn-outline-secondary px-3 py-2 rounded-pill fw-medium">
                <i class="bi bi-arrow-clockwise me-1"></i> Sinkronkan Layar
            </button>
        </div>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bundle.min.js"></script>

<script>
    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('data-container').style.display = 'none';
        
        try {
            const response = await fetch('./data.json?t=' + new Date().getTime()); 
            const data = await response.json();
            
            if (data.status === 'success') {
                document.getElementById('nama').innerText = data.profil.nama || '-';
                document.getElementById('pt').innerText = data.profil.nama_pt || '-';
                document.getElementById('prodi').innerText = data.profil.nama_prodi || '-';
                document.getElementById('nidn').innerText = data.profil.nidn || '-';
                
                const totalPengabdian = data.pengabdian ? data.pengabdian.length : 0;
                const totalPublikasi = data.publikasi ? data.publikasi.length : 0;
                
                document.getElementById('count-pengabdian').innerText = totalPengabdian;
                document.getElementById('count-publikasi').innerText = totalPublikasi;

                // --- INJEKSI UI SINTA SCORE ---
                // Mengecek apakah data Sinta berhasil ditarik dari backend
                if (data.sinta_score && Object.keys(data.sinta_score).length > 0) {
                    const profileCard = document.querySelector('.card-profile .d-flex.flex-wrap.gap-2');
                    
                    // Membuat HTML untuk Skor Sinta
                    const overallScore = data.sinta_score.overall_v2 || data.sinta_score.overall || 0;
                    const yearsScore = data.sinta_score['3_years_v2'] || data.sinta_score['3_years'] || 0;
                    
                    let sintaHtml = `
                        <div class="w-100 mt-2 mb-1 border-top pt-3 d-flex flex-wrap gap-2 align-items-center">
                            <span class="badge bg-warning text-dark border px-2 py-1.5 rounded-pill"><i class="bi bi-star-fill text-danger me-1"></i> SINTA Score: ${overallScore}</span>
                            <span class="badge bg-light text-dark border px-2 py-1.5 rounded-pill">3 Yrs Score: ${yearsScore}</span>
                            <div class="ms-auto d-flex gap-1">
                    `;

                    // Membuat Badge untuk Akreditasi S1 - S6 (Hanya tampilkan jika jumlah > 0)
                    const k = data.sinta_kategori;
                    if(k) {
                        if(k.S1 > 0) sintaHtml += `<span class="badge bg-danger">S1: ${k.S1}</span>`;
                        if(k.S2 > 0) sintaHtml += `<span class="badge bg-warning text-dark">S2: ${k.S2}</span>`;
                        if(k.S3 > 0) sintaHtml += `<span class="badge bg-success">S3: ${k.S3}</span>`;
                        if(k.S4 > 0) sintaHtml += `<span class="badge bg-info text-dark">S4: ${k.S4}</span>`;
                        if(k.S5 > 0) sintaHtml += `<span class="badge bg-secondary">S5: ${k.S5}</span>`;
                        if(k.S6 > 0) sintaHtml += `<span class="badge bg-secondary">S6: ${k.S6}</span>`;
                    }
                    
                    sintaHtml += `</div></div>`;
                    
                    // Cek agar tidak duplikat saat reload
                    if(!document.getElementById('sinta-badges-container')) {
                        const sintaContainer = document.createElement('div');
                        sintaContainer.id = 'sinta-badges-container';
                        sintaContainer.className = 'w-100';
                        sintaContainer.innerHTML = sintaHtml;
                        profileCard.parentNode.appendChild(sintaContainer);
                    }
                }
                
                const renderContainer = (elementId, arrayData, keyText, keySub, textBadgeClass) => {
                    const container = document.getElementById(elementId);
                    container.innerHTML = '';
                    
                    if (!arrayData || arrayData.length === 0) {
                        container.innerHTML = `<div class="text-center text-muted py-5"><i class="bi bi-folder-x fs-2 d-block mb-2 opacity-50"></i><span class="small fw-medium">Belum ada data riwayat.</span></div>`;
                        return;
                    }
                    
                    arrayData.forEach(item => {
                        container.innerHTML += `<div class="data-item d-flex justify-content-between align-items-start gap-3"><div class="flex-grow-1"><div class="fw-semibold text-dark small mb-1">${item[keyText]}</div></div><span class="badge ${textBadgeClass} rounded px-2 py-1 small align-self-start text-uppercase" style="font-size:0.65rem; font-weight:700;">${item[keySub]}</span></div>`;
                    });
                };

                renderContainer('list-pengabdian', data.pengabdian, 'judul', 'tahun', 'bg-success text-white');
                renderContainer('list-publikasi', data.publikasi, 'judul', 'jenis', 'bg-primary text-white');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('data-container').style.display = 'block';
            } else {
                alert(data.pesan);
            }
        } catch (error) {
            console.error(error);
        }
    }
    window.onload = fetchData;
</script>
</body>
</html>
