<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Akademik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0; padding: 2rem 0 4rem 0;
            line-height: 1.6;
        }

        /* CONTAINER UTAMA (MAKSIMAL ELEGAN) */
        .cv-wrapper {
            background: var(--bg-card);
            width: 100%; max-width: 200mm;
            margin: 0 auto; padding: 45px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 10px 15px -3px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            position: relative;
        }

        /* HEADER IDENTITAS */
        .profile-header {
            display: flex; gap: 24px; align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px; margin-bottom: 20px;
        }

        .photo-frame {
            width: 90px; height: 120px;
            border: 1px solid var(--border);
            border-radius: 8px; background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; overflow: hidden;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .photo-frame .fa-user-tie { font-size: 3rem; color: #cbd5e1; }

        .cv-name { font-size: 22px; font-weight: 800; text-transform: uppercase; margin: 0 0 2px 0; letter-spacing: -0.5px; }
        .cv-title { font-size: 12.5px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; margin: 0 0 10px 0; letter-spacing: 0.5px; }
        
        .meta-info-flex { display: flex; flex-wrap: wrap; gap: 6px 20px; font-size: 11.5px; font-weight: 500; color: var(--text-gray); }
        .meta-info-item { display: flex; align-items: center; gap: 6px; }
        .meta-info-item i { color: #94a3b8; }
        .meta-info-item a { color: var(--accent); text-decoration: none; font-weight: 600; }

        /* SEKSI STATIS (PENDIDIKAN) */
        .edu-static-section { margin-bottom: 25px; }
        .edu-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-dark); letter-spacing: 0.5px; margin-bottom: 8px; }
        .edu-item { font-size: 12px; color: var(--text-dark); font-weight: 600; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .edu-item span.inst { color: var(--text-gray); font-weight: 400; margin-left: 5px; }

        /* --- ARSITEKTUR TABS MINIMALIS --- */
        .nav-tabs-formal {
            display: flex; gap: 1.5rem;
            border-bottom: 2px solid var(--border);
            margin-bottom: 18px; margin-top: 25px;
        }
        .tab-link-btn {
            background: none; border: none;
            padding: 0.5rem 0; font-size: 13px; font-weight: 700;
            color: var(--text-gray); text-transform: uppercase;
            letter-spacing: 0.5px; cursor: pointer;
            position: relative; transition: color 0.2s ease;
        }
        .tab-link-btn:hover { color: var(--text-dark); }
        .tab-link-btn.active { color: var(--accent); }
        .tab-link-btn.active::after {
            content: ''; position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 2px; background: var(--accent);
        }

        .tab-pane-content { display: none; animation: tabFadeIn 0.25s ease-in-out; }
        .tab-pane-content.active { display: block; }
        @keyframes tabFadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ISI KONTEN DOKUMEN --- */
        .university-container { margin-bottom: 15px; }
        .uni-badge-title { font-size: 11.5px; font-weight: 800; color: var(--text-dark); background: #f1f5f9; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
        .nested-course-row { padding-left: 10px; margin-bottom: 5px; font-size: 12px; }
        .nested-course-name { font-weight: 600; color: var(--text-dark); }
        .nested-course-semesters { font-size: 11px; color: var(--text-gray); margin-top: 1px; }

        .standard-list-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; padding: 8px 0; border-bottom: 1px dashed var(--border); }
        .standard-list-row:last-child { border-bottom: none; }
        .row-left-block { flex: 1; font-size: 12.5px; font-weight: 500; line-height: 1.4; }
        .row-left-block a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .row-left-block a:hover { text-decoration: underline; }
        
        .meta-badges-flex { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 3px; font-size: 10.5px; }
        .badge-type { border: 1px solid var(--text-gray); padding: 0px 4px; border-radius: 3px; text-transform: uppercase; font-weight: 700; color: var(--text-gray); }
        .badge-cite { color: #b45309; font-weight: 600; }

        .row-right-year { font-size: 12px; font-weight: 700; color: var(--text-dark); flex-shrink: 0; text-align: right; width: 60px; }

        /* UTILITY PANEL */
        .btn-panel { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .btn-action-formal { background: transparent; border: 1px solid var(--text-dark); color: var(--text-dark); font-weight: 700; font-size: 9px; text-transform: uppercase; padding: 5px 10px; border-radius: 4px; }
        .btn-action-formal:hover { background: var(--text-dark); color: #fff; }
        
        #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 35vh; }
        .spinner-line { border: 2px solid #f3f3f3; border-top: 2px solid var(--text-dark); border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* PRINT MEDIA ENGINE RULES */
        @media print {
            @page { size: A4; margin: 15mm; }
            body { background: #fff; padding: 0; margin: 0; }
            .cv-paper { box-shadow: none; padding: 0; width: 100%; border: none; }
            .btn-panel, .d-print-none, .nav-tabs-formal { display: none !important; }
            
            /* Tampilkan seluruh seksi tab secara berurutan ke bawah secara otomatis saat di-print ke PDF */
            .tab-pane-content { display: block !important; opacity: 1 !important; margin-top: 20px; }
            .tab-pane-content::before { content: attr(data-print-title); font-size: 12px; font-weight: 800; text-transform: uppercase; display: block; border-bottom: 1.5px solid #000; padding-bottom: 2px; margin-bottom: 10px; }
            
            .row-left-block a { color: #000 !important; text-decoration: none !important; pointer-events: none; }
            .standard-list-row, .university-group { page-break-inside: avoid !important; }
        }

        @media (max-width: 767.98px) {
            body { padding: 10px 0; }
            .cv-paper { padding: 25px 20px; box-shadow: none; border-radius: 0; }
            .profile-header { flex-direction: column; align-items: center; text-align: center; }
            .meta-info-flex { justify-content: center; }
            .btn-panel { position: static; justify-content: center; margin-bottom: 15px; }
            .nav-tabs-formal { gap: 1rem; justify-content: center; }
            .standard-list-row { flex-direction: column; gap: 4px; }
            .row-right-year { text-align: left; }
        }
    </style>
</head>
<body>

<div class="cv-paper">
    
    <div class="btn-panel d-print-none">
        <button onclick="window.print()" class="btn-action-formal"><i class="fa-solid fa-file-pdf me-1"></i> Cetak PDF</button>
        <button onclick="fetchData()" class="btn-action-formal"><i class="fa-solid fa-sync"></i></button>
    </div>

    <div id="loading">
        <div class="spinner-line"></div>
        <div style="font-size: 10px; font-weight: 700; color: var(--text-gray); letter-spacing: 0.5px;">SINKRONISASI DATA...</div>
    </div>

    <div id="data-container" style="display: none;">
        
        <div class="profile-header">
            <div class="photo-frame">
                <img id="cv-photo" src="foto-profil.jpg" alt="Pasfoto" onerror="switchToAvatarFallback()">
                <div id="cv-avatar-fallback" style="display: none;"><i class="fa-solid fa-user-tie"></i></div>
            </div>
            <div class="header-content">
                <h1 id="nama" class="cv-name">-</h1>
                <div id="prodi-title" class="cv-title">-</div>
                <div class="meta-info-flex">
                    <div class="meta-info-item"><i class="fa-solid fa-landmark"></i><span id="pt">-</span></div>
                    <div class="meta-info-item"><i class="fa-solid fa-id-card"></i>NIDN: <span id="nidn">-</span></div>
                    <div class="meta-info-item d-print-none"><i class="fa-solid fa-globe"></i><a href="https://visegu.my.id" target="_blank">visegu.my.id</a></div>
                </div>
            </div>
        </div>

        <div class="edu-static-section">
            <div class="edu-title">Pendidikan Formal</div>
            <div id="list-pendidikan"></div>
        </div>

        <div class="nav-tabs-formal d-print-none">
            <button class="tab-link-btn active" onclick="switchTab(event, 'pane-mengajar')">Pengajaran</button>
            <button class="tab-link-btn" onclick="switchTab(event, 'pane-publikasi')">Penelitian</button>
            <button class="tab-link-btn" onclick="switchTab(event, 'pane-pengabdian')">Pengabdian</button>
        </div>

        <div id="pane-mengajar" class="tab-pane-content active" data-print-title="Riwayat Pengajaran">
            <div id="list-mengajar"></div>
        </div>

        <div id="pane-publikasi" class="tab-pane-content" data-print-title="Karya Ilmiah & Penelitian">
            <div id="list-publikasi"></div>
        </div>

        <div id="pane-pengabdian" class="tab-pane-content" data-print-title="Pengabdian Masyarakat & Internal">
            <div id="list-pengabdian"></div>
        </div>

    </div>
</div>

<script>
    // Sistem Engine Pengendali Tab Browser
    function switchTab(evt, paneId) {
        const tabPanes = document.getElementsByClassName("tab-pane-content");
        for (let i = 0; i < tabPanes.length; i++) {
            tabPanes[i].classList.remove("active");
        }
        const tabLinks = document.getElementsByClassName("tab-link-btn");
        for (let i = 0; i < tabLinks.length; i++) {
            tabLinks[i].classList.remove("active");
        }
        document.getElementById(paneId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('data-container').style.display = 'none';
        
        try {
            const response = await fetch('./data.json?t=' + new Date().getTime()); 
            const data = await response.json();
            
            if (data.status === 'success') {
                document.getElementById('nama').innerText = data.profil.nama || '-';
                document.getElementById('pt').innerText = (data.profil.nama_pt || '-').toUpperCase();
                document.getElementById('prodi-title').innerText = "Dosen Program Studi " + (data.profil.nama_prodi || '-');
                document.getElementById('nidn').innerText = data.profil.nidn || '-';
                
                // RENDER PENDIDIKAN (STATIC JANGKAR)
                const eduContainer = document.getElementById('list-pendidikan');
                eduContainer.innerHTML = '';
                if (data.pendidikan && data.pendidikan.length > 0) {
                    data.pendidikan.sort((a, b) => String(b.tahun || "0").localeCompare(String(a.tahun || "0")));
                    data.pendidikan.forEach(item => {
                        eduContainer.innerHTML += `
                            <div class="edu-item">
                                <div>&bull; ${item.jenjang}<span class="inst">&ndash; ${item.pt}</span></div>
                                <div style="color:var(--text-gray); font-weight:400;">Lulus ${item.tahun}</div>
                            </div>`;
                    });
                }

                // RENDER TAB 1: PENGAJARAN (PARENT-CHILD KAMPUS -> MATKUL)
                const teachContainer = document.getElementById('list-mengajar');
                teachContainer.innerHTML = '';
                if (data.mengajar && data.mengajar.length > 0 && data.mengajar[0].mata_kuliah) {
                    data.mengajar.forEach(kampus_group => {
                        let html_tree = `
                        <div class="university-group">
                            <div class="uni-header"><i class="fa-solid fa-landmark me-2" style="font-size:10px;"></i>${kampus_group.nama_kampus}</div>`;
                        
                        kampus_group.mata_kuliah.forEach(mk_group => {
                            html_tree += `
                            <div class="course-item">
                                <div class="course-name">${mk_group.nama}</div>
                                <div class="course-semesters">Semester: ${mk_group.semester}</div>
                            </div>`;
                        });
                        html_tree += `</div>`;
                        teachContainer.innerHTML += html_tree;
                    });
                } else {
                    teachContainer.innerHTML = '<div class="section-desc text-muted">Tidak ada data riwayat pengajaran.</div>';
                }

                // RENDER TAB 2: PENELITIAN (PUBLIKASI JURNAL DENGAN LINK VERIFIED)
                const pubContainer = document.getElementById('list-publikasi');
                pubContainer.innerHTML = '';
                if (data.publikasi && data.publikasi.length > 0) {
                    data.publikasi.forEach(item => {
                        const titleTag = (item.link && item.link !== '') ? 
                            `<a href="${item.link}" target="_blank" class="publication-link">${item.judul} <i class="fa-solid fa-arrow-up-right-from-square d-print-none" style="font-size:8px; opacity:0.6;"></i></a>` : 
                            `<span>${item.judul}</span>`;
                        const citationInfo = (item.sitasi && item.sitasi !== '0') ? `<span class="badge-cite"><i class="fa-solid fa-star me-1"></i>${item.sitasi} Sitasi</span>` : '';

                        pubContainer.innerHTML += `
                            <div class="standard-list-row">
                                <div class="row-main">
                                    <div class="row-left-block">${titleTag}</div>
                                    <div class="meta-badges-flex">
                                        <span class="badge-type">${item.jenis}</span>
                                        ${citationInfo}
                                    </div>
                                </div>
                                <div class="row-right-year">${item.tahun}</div>
                            </div>`;
                    });
                } else {
                    pubContainer.innerHTML = '<div class="section-desc text-muted">Tidak ada data publikasi penelitian.</div>';
                }

                // RENDER TAB 3: PENGABDIAN MASYARAKAT
                const svcContainer = document.getElementById('list-pengabdian');
                svcContainer.innerHTML = '';
                if (data.pengabdian && data.pengabdian.length > 0) {
                    data.pengabdian.forEach(item => {
                        svcContainer.innerHTML += `
                            <div class="standard-list-row">
                                <div class="row-main">
                                    <div class="row-left-block">${item.judul}</div>
                                    <div class="meta-badges-flex"><span class="badge-type">${item.kategori}</span></div>
                                </div>
                                <div class="row-right-year">${item.tahun}</div>
                            </div>`;
                    });
                } else {
                    svcContainer.innerHTML = '<div class="section-desc text-muted">Tidak ada data pengabdian masyarakat.</div>';
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('data-container').style.display = 'block';
            }
        } catch (error) {
            console.error(error);
        }
    }
    window.onload = fetchData;
</script>
</body>
</html>
