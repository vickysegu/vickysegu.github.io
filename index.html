    <script>
        function switchToAvatarFallback() {
            const photoEl = document.getElementById('cv-photo');
            const fallbackEl = document.getElementById('cv-avatar-fallback');
            if(photoEl && fallbackEl) {
                photoEl.classList.add('d-none');
                fallbackEl.classList.remove('d-none');
            }
        }
    </script>
