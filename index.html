<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Vicky Setia Gunawan — Portofolio Akademik</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* ══════════════════════════════════════════════
       CHIPS & NOTIFIKASI
    ══════════════════════════════════════════════ */
    .semester-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip {
        background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text-primary); padding: 4px 10px; border-radius: var(--radius-pill);
        font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
        backdrop-filter: blur(4px);
    }
    #chip-notif {
        position: fixed; top: 0; left: 50%; transform: translate(-50%, -30px);
        z-index: 9999; opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease;
        background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text-primary); padding: 14px 28px; border-radius: 30px;
        font-size: 16px; font-weight: 600; letter-spacing: 0.5px;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        min-width: 250px; text-align: center;
    }
    .checkmark { margin-right: 10px; font-size: 18px; color: limegreen; transform: scale(0); transition: transform 0.3s ease; }
    .checkmark.animate { transform: scale(1.2); }

    /* ══════════════════════════════════════════════
       ROOT & THEME VARIABLES (BOTANICAL GREEN)
    ══════════════════════════════════════════════ */
    :root {
      --font-system: 'Plus Jakarta Sans', sans-serif;
      --text-primary:     #ffffff; 
      --text-secondary:   rgba(255, 255, 255, 0.85); 
      --text-tertiary:    rgba(255, 255, 255, 0.5); 
      
      /* Aksen Hijau Zamrud terang */
      --accent:           #34d399; 
      --accent-muted:     rgba(52, 211, 153, 0.2);
      
      --radius-pill:      9999px;
      --radius-xl:        32px;
      --radius-lg:        20px;
      --radius-md:        16px;
      
      --safe-top:         env(safe-area-inset-top, 20px);
      --safe-bottom:      env(safe-area-inset-bottom, 20px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-system);
      /* Latar belakang daun hijau gelap HD */
      background: #022c16 url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=2000&auto=format') center/cover no-repeat fixed;
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
      padding: calc(var(--safe-top) + 20px) 20px var(--safe-bottom) 20px; 
    }

    /* ══════════════════════════════════════════════
       ONE-PAGE APP LAYOUT
    ══════════════════════════════════════════════ */
    .app-container {
      width: 100%; max-width: 1100px; height: 100%; max-height: 850px;
      display: flex; flex-direction: column; gap: 20px;
      opacity: 0; transition: opacity 0.3s ease; /* Transisi dipercepat */
    }

    @media (min-width: 768px) {
      .app-container { flex-direction: row; height: 85vh; }
      body { padding: var(--safe-top) 20px var(--safe-bottom) 20px; }
    }

    /* ══════════════════════════════════════════════
       VANILLA LIQUID GLASS ENGINE (GREEN SMOKED)
    ══════════════════════════════════════════════ */
    .glass-panel {
      /* Kaca hijau gelap transparan */
      background: linear-gradient(135deg, rgba(6, 78, 59, 0.4) 0%, rgba(2, 44, 34, 0.6) 100%);
      backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 16px 40px rgba(0, 0, 0, 0.4);
      border-radius: var(--radius-xl);
    }

    /* ══════════════════════════════════════════════
       1. SIDEBAR (PROFIL)
    ══════════════════════════════════════════════ */
    .sidebar {
      flex: 0 0 auto; padding: 24px; display: flex; flex-direction: row;
      align-items: center; gap: 20px; overflow: hidden;
    }
    .avatar-wrapper {
      width: 80px; height: 80px; flex-shrink: 0; border-radius: var(--radius-pill); padding: 3px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    .avatar-inner { width: 100%; height: 100%; border-radius: inherit; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; overflow: hidden; }

    .profile-info { flex: 1; }
    .profile-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 2px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .profile-role { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
    .profile-bio { display: none; }
    
    .social-links { display: flex; gap: 8px; margin-top: 12px; }
    .social-btn {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-pill); background: rgba(255,255,255,0.1);
      color: var(--text-primary); border: 1px solid rgba(255,255,255,0.15);
      text-decoration: none; transition: 0.3s ease;
      cursor: pointer;
    }
    .social-btn:hover { background: var(--accent-muted); color: var(--accent); border-color: rgba(52, 211, 153, 0.4); }

    /* Tombol Download PDF (Mode Desktop) */
    .btn-download { display: none; }

    @media (min-width: 768px) {
      .sidebar { flex: 0 0 320px; flex-direction: column; text-align: center; padding: 48px 32px; justify-content: center; }
      .avatar-wrapper { width: 150px; height: 150px; margin-bottom: 16px; }
      .profile-name { font-size: 28px; margin-bottom: 4px; }
      .profile-bio { display: block; font-size: 14.5px; line-height: 1.6; color: var(--text-secondary); margin-top: 20px; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
      .social-links { justify-content: center; margin-top: 24px; }
      
      .btn-download {
        display: inline-flex; align-items: center; gap: 8px; margin-top: 20px;
        padding: 10px 20px; border-radius: var(--radius-pill); background: rgba(52, 211, 153, 0.2);
        border: 1px solid rgba(52, 211, 153, 0.5); color: #fff; font-weight: 700; cursor: pointer;
        transition: 0.2s; font-size: 13px;
      }
      .btn-download:hover { background: var(--accent); border-color: var(--accent); color: #022c16; }
    }

    /* ══════════════════════════════════════════════
       2. AREA KONTEN UTAMA (APP WINDOW)
    ══════════════════════════════════════════════ */
    .main-window { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    .window-header {
      padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
    }
    .window-header::-webkit-scrollbar { display: none; }

    .nav-tab {
      padding: 10px 20px; border-radius: var(--radius-pill); border: 1px solid transparent; background: transparent;
      color: var(--text-tertiary); font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; white-space: nowrap; position: relative;
    }
    .nav-tab i { font-size: 16px; }
    .nav-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.05); }
    .nav-tab.active {
      background: rgba(255, 255, 255, 0.15); color: #ffffff; border-color: rgba(255, 255, 255, 0.25);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.15);
    }
    
    .badge-count { background: var(--accent); color: #064e3b; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: 800; }
    .nav-tab.active .badge-count { background: #fff; }

    /* Area Scroll Internal */
    .window-body { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
    .window-body::-webkit-scrollbar { width: 6px; }
    .window-body::-webkit-scrollbar-track { background: transparent; }
    .window-body::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    .window-body::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

    .content-section { display: none; animation: fadeIn 0.4s ease forwards; }
    .content-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ══════════════════════════════════════════════
       ELEMEN DI DALAM KONTEN
    ══════════════════════════════════════════════ */
    .section-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: var(--text-primary); display: flex; align-items: center; gap: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .section-title i { color: var(--accent); }

    .grid-list { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 1024px) { .grid-list { grid-template-columns: 1fr 1fr; } }

    .glass-card {
      background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-lg);
      padding: 16px; box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      display: flex; gap: 16px;
      transition: transform 0.2s, background 0.2s;
    }
    .glass-card:hover { background: rgba(0, 0, 0, 0.35); transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.2); }
    
    .card-icon { width: 44px; height: 44px; flex-shrink: 0; border-radius: var(--radius-md); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 14px; font-weight: 800; }
    .card-info { flex: 1; }
    .item-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; line-height: 1.4; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .item-title a { color: inherit; text-decoration: none; transition: color 0.2s;}
    .item-title a:hover { color: var(--accent); }
    .item-desc { font-size: 13px; color: var(--text-tertiary); font-weight: 500; margin-bottom: 8px;}
    .item-meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px; padding: 4px 8px; font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
    .badge.highlight { background: var(--accent-muted); color: var(--accent); border-color: rgba(52, 211, 153, 0.3); }

    /* ══════════════════════════════════════════════
       FLOATING LIQUID GLASS NAVBAR (HANYA MOBILE)
    ══════════════════════════════════════════════ */
    @media (max-width: 767px) {
      .window-header {
        position: fixed; bottom: 20px; left: 16px; right: 16px; z-index: 1000;
        background: rgba(2, 44, 34, 0.75); backdrop-filter: blur(24px) saturate(200%); -webkit-backdrop-filter: blur(24px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        border-radius: 28px; padding: 8px; justify-content: space-between; gap: 4px;
      }
      
      /* PERBAIKAN VITAL: Menambahkan Padding Bawah di setiap Section Konten */
      .content-section { padding-bottom: 120px; }
      
      .nav-tab { flex-direction: column; padding: 10px 4px; gap: 6px; flex: 1; border-radius: 20px; }
      .nav-tab i { font-size: 18px; margin-bottom: 2px; }
      .nav-tab .tab-text { font-size: 10px; font-weight: 700; letter-spacing: 0.2px; }
      .badge-count { position: absolute; top: 2px; right: calc(50% - 24px); padding: 2px 5px; font-size: 9px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

      /* Tampilkan ikon download PDF di sidebar mobile */
      .btn-download-mobile { display: flex; }
    }

    /* LOADER */
    #page-loader { position: fixed; inset: 0; z-index: 999; background: #022c16; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.3s ease; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite; }
    #page-loader.hidden { opacity: 0; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* CSS TERSEMBUNYI UNTUK GENERATE PDF */
    .pdf-cv-container { width: 210mm; padding: 40px 50px; background: #ffffff; font-family: sans-serif; color: #111827; }
    .pdf-header { border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 15px; display: flex; align-items: flex-start; }
    .pdf-photo { width: 90px; height: 120px; border: 1.5px solid #000; background: #f9fafb; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .pdf-photo img { width: 100%; height: 100%; object-fit: cover; }
    .pdf-info { margin-left: 20px; flex-grow: 1; }
    .pdf-name { font-size: 20px; font-weight: 800; text-transform: uppercase; color: #000; margin-bottom: 2px; line-height: 1.2; }
    .pdf-role { font-size: 11.5px; font-weight: 700; color: #374151; text-transform: uppercase; margin-bottom: 6px; }
    .pdf-meta { font-size: 10.5px; color: #111827; line-height: 1.4; }
    .pdf-section-title { font-size: 12px; font-weight: 800; text-transform: uppercase; color: #000; border-bottom: 1.5px solid #000; padding-bottom: 2px; margin-top: 15px; margin-bottom: 8px; }
    .pdf-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px dotted #e2e8f0; }
    .pdf-row:last-child { border-bottom: none; }
    .pdf-main { font-size: 11px; font-weight: 600; color: #000; flex: 1; padding-right: 15px; line-height: 1.3; }
    .pdf-side { font-size: 10px; color: #4b5563; text-align: right; flex-shrink: 0; max-width: 45%; }
    .pdf-badge { font-size: 8.5px; font-weight: 700; border: 1px solid #4b5563; padding: 0px 3px; text-transform: uppercase; color: #111827; margin-right: 5px; }
    .pdf-tree { margin-bottom: 8px; }
    .pdf-uni-header { font-size: 11px; font-weight: 800; color: #000; margin-bottom: 4px; display: flex; align-items: center; }
    .pdf-course { margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px dotted #e2e8f0; display: flex; justify-content: space-between; }
  </style>
</head>
<body>

  <div id="page-loader">
    <div class="spinner"></div>
    <div style="font-weight: 700; color: #cbd5e1; font-size: 14px;">Memuat Aplikasi...</div>
  </div>
  
  <div id="chip-notif" class="chip" style="display:none; opacity:0;">
    <span class="checkmark">&#10003;</span> Email berhasil disalin!
  </div>

  <div class="app-container" id="app-container">

    <aside class="glass-panel sidebar">
      <div class="avatar-wrapper">
        <div class="avatar-inner">
          <img id="cv-photo" src="profile.jpg" alt="Foto" onerror="this.style.display='none'; document.getElementById('cv-avatar-fallback').style.display='block';" style="width: 100%; height: 100%; object-fit: cover;">
          <i id="cv-avatar-fallback" class="fa-solid fa-user" style="display: none; font-size: 40px; color: #94a3b8;"></i>
        </div>
      </div>
      <div class="profile-info">
        <h1 class="profile-name" id="prof-name">—</h1>
        <div class="profile-role" id="prof-role">—</div>
        <div class="profile-role" id="prof-nidn" style="color:var(--text-tertiary); font-size: 12px; margin-top:-6px;">—</div>
        
        <p class="profile-bio">
          Dosen aktif di bidang Bisnis Digital dengan keahlian dalam pengembangan sistem informasi, kecerdasan buatan, dan pemrograman web. Aktif berkontribusi melalui penelitian dan publikasi ilmiah.
        </p>

        <div class="social-links">
          <a href="#" class="social-btn" onclick="copyEmail()"><i class="fa-solid fa-envelope"></i></a>
          <a href="https://www.linkedin.com/in/vickysetiagunawan/" class="social-btn" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
          <a href="https://scholar.google.com/citations?user=zxh3WngAAAAJ&hl=en" class="social-btn" target="_blank"><i class="fa-solid fa-graduation-cap"></i></a>
          <a href="#" class="social-btn btn-download-mobile d-md-none" onclick="downloadPDFDirect()" id="btn-dl-mobile"><i class="fa-solid fa-file-pdf"></i></a>
        </div>
        
        <button class="btn-download" id="btn-dl-desktop" onclick="downloadPDFDirect()"><i class="fa-solid fa-file-pdf"></i> Unduh CV PDF</button>
      </div>
    </aside>

    <main class="glass-panel main-window">
      
      <header class="window-header">
        <button class="nav-tab active" onclick="openTab('edu', this)">
          <i class="fa-solid fa-user-graduate"></i> <span class="tab-text">Profil</span>
        </button>
        <button class="nav-tab" onclick="openTab('teach', this)">
          <i class="fa-solid fa-chalkboard-user"></i> <span class="tab-text">Mengajar</span> <span class="badge-count" id="count-teach" style="display:none;">0</span>
        </button>
        <button class="nav-tab" onclick="openTab('pub', this)">
          <i class="fa-solid fa-book-open"></i> <span class="tab-text">Publikasi</span> <span class="badge-count" id="count-pub" style="display:none;">0</span>
        </button>
        <button class="nav-tab" onclick="openTab('srv', this)">
          <i class="fa-solid fa-handshake-angle"></i> <span class="tab-text">Pengabdian</span> <span class="badge-count" id="count-srv" style="display:none;">0</span>
        </button>
      </header>

      <div class="window-body" id="scroll-area">
        
        <div class="content-section active" id="tab-edu">
          <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pendidikan</h2>
          <div class="grid-list" id="edu-grid"></div>
        </div>

        <div class="content-section" id="tab-teach">
          <div id="teach-content"></div>
        </div>

        <div class="content-section" id="tab-pub">
          <div class="grid-list" id="pub-content"></div>
        </div>

        <div class="content-section" id="tab-srv">
          <div class="grid-list" id="srv-content"></div>
        </div>

      </div>

    </main>
  </div>

  <template id="cv-pdf-template">
    <div class="pdf-cv-container">
      <div class="pdf-header">
        <div class="pdf-photo"><img src="profile.jpg" alt="Pasfoto" onerror="this.style.display='none';"></div>
        <div class="pdf-info">
          <div class="pdf-name" id="pdf-nama"></div>
          <div class="pdf-role" id="pdf-prodi"></div>
          <div class="pdf-meta"><div id="pdf-pt"></div><div id="pdf-nidn"></div><div>visegu.my.id</div></div>
        </div>
      </div>
      <div class="pdf-section-title">1. Pendidikan Formal</div><div id="pdf-edu-list"></div>
      <div class="pdf-section-title">2. Riwayat Pengajaran</div><div id="pdf-teach-list"></div>
      <div class="pdf-section-title">3. Publikasi & Karya Ilmiah</div><div id="pdf-pub-list"></div>
      <div class="pdf-section-title">4. Pengabdian Masyarakat</div><div id="pdf-svc-list"></div>
    </div>
  </template>

  <script>
    const $ = id => document.getElementById(id);
    
    function openTab(tabId, btn) {
      if (navigator.vibrate) navigator.vibrate(10);
      document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
      $('tab-' + tabId).classList.add('active');
      btn.classList.add('active');
      $('scroll-area').scrollTop = 0;
    }

    function getLatestYear(str) {
      if (!str) return 0;
      const years = [...str.matchAll(/\d{4}/g)].map(m => parseInt(m[0]));
      return years.length ? Math.max(...years) : 0;
    }

    function getCampusLatestYear(kampus) {
      if (!kampus.mata_kuliah || kampus.mata_kuliah.length === 0) return 0;
      const years = kampus.mata_kuliah.map(mk => getLatestYear(mk.semester));
      return Math.max(...years);
    }

    async function loadData() {
      try {
        const res = await fetch('./data.json?t=' + Date.now());
        const data = await res.json();
        if (data.status !== 'success') throw new Error('Data Error');
        
        window.cvDataCache = data; // Simpan untuk PDF
        
        // 1. Setup Profil
        const p = data.profil;
        $('prof-name').textContent = p.nama || '—';
        $('prof-role').textContent = `Dosen ${p.nama_prodi || ''}`;
        $('prof-nidn').textContent = `NIDN. ${p.nidn || '—'} • ${p.nama_pt || ''}`;

        // 2. Setup Pendidikan
        const eduSorted = [...(data.pendidikan||[])].sort((a,b) => +b.tahun - +a.tahun);
        $('edu-grid').innerHTML = eduSorted.map(e => `
          <div class="glass-card">
            <div class="card-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <div class="card-info">
              <div class="item-title">${e.pt}</div>
              <div class="item-desc">${e.jenjang} • ${e.prodi !== 'N/A' ? e.prodi : '-'}</div>
              <div class="item-meta"><span class="badge highlight">Lulus ${e.tahun}</span></div>
            </div>
          </div>
        `).join('');

        // 3. Setup Mengajar
        const tc = $('teach-content');
        if (!data.mengajar || !data.mengajar.length) {
          tc.innerHTML = '<p style="color:var(--text-tertiary); font-size:14px;">Tidak ada data.</p>';
        } else {
          let tCount = 0;
          const sortedKampus = [...data.mengajar].sort((a, b) => getCampusLatestYear(b) - getCampusLatestYear(a));

          tc.innerHTML = sortedKampus.map(kampus => {
            const sortedMatkul = (kampus.mata_kuliah || []).sort((a, b) => getLatestYear(b.semester) - getLatestYear(a.semester));
            const courses = sortedMatkul.map(mk => {
              tCount++;
              const semesterList = (mk.semester || '').split(',').map(s => s.trim());
              const chipsHtml = semesterList.map(s => `<span class="chip">${s}</span>`).join('');
              return `
                <div class="glass-card" style="margin-bottom:12px;">
                  <div class="card-icon"><i class="fa-solid fa-chalkboard"></i></div>
                  <div class="card-info">
                    <div class="item-title">${mk.nama}</div>
                    <div class="semester-chips">${chipsHtml}</div>
                  </div>
                </div>`;
            }).join('');
            
            return `<div style="margin-bottom: 24px;">
                      <h3 style="font-size:15px; color:var(--text-secondary); margin-bottom:12px;">
                        <i class="fa-solid fa-building-columns" style="margin-right:6px;"></i>${kampus.nama_camp_||kampus.nama_kampus}
                      </h3>
                      <div class="grid-list">${courses}</div>
                    </div>`;
          }).join('');
          
          if(tCount > 0) {
            $('count-teach').textContent = tCount;
            $('count-teach').style.display = 'inline-block';
          }
        }

        // 4. Setup Publikasi
        const pc = $('pub-content');
        if (!data.publikasi || !data.publikasi.length) {
          pc.innerHTML = '<p style="color:var(--text-tertiary); font-size:14px;">Tidak ada data.</p>';
        } else {
          const pubSorted = [...data.publikasi].sort((a, b) => parseInt(b.tahun) - parseInt(a.tahun));
          $('count-pub').textContent = pubSorted.length;
          $('count-pub').style.display = 'inline-block';

          pc.innerHTML = pubSorted.map(pub => {
            const t = pub.link ? `<a href="${pub.link}" target="_blank">${pub.judul} <i class="fa-solid fa-up-right-from-square" style="font-size:10px;"></i></a>` : pub.judul;
            return `
              <div class="glass-card">
                <div class="card-icon">${pub.tahun}</div>
                <div class="card-info">
                  <div class="item-title">${t}</div>
                  <div class="item-meta">
                    <span class="badge">${pub.jenis}</span>
                    ${parseInt(pub.sitasi||0) > 0 ? `<span class="badge highlight"><i class="fa-solid fa-pencil-line"></i> ${pub.sitasi}</span>` : ''}
                  </div>
                </div>
              </div>`;
          }).join('');
        }

        // 5. Setup Pengabdian
        const sc = $('srv-content');
        if (!data.pengabdian || !data.pengabdian.length) {
          sc.innerHTML = '<p style="color:var(--text-tertiary); font-size:14px;">Tidak ada data.</p>';
        } else {
          const srvSorted = [...data.pengabdian].sort((a, b) => parseInt(b.tahun) - parseInt(a.tahun));
          $('count-srv').textContent = srvSorted.length;
          $('count-srv').style.display = 'inline-block';

          sc.innerHTML = srvSorted.map(item => `
            <div class="glass-card">
              <div class="card-icon">${item.tahun}</div>
              <div class="card-info">
                <div class="item-title">${item.judul}</div>
                <div class="item-meta"><span class="badge highlight">${item.kategori}</span></div>
              </div>
            </div>`).join('');
        }

        // PERBAIKAN: HILANGKAN JEDA ANIMASI, LANGSUNG TAMPILKAN SEKETIKA
        $('page-loader').classList.add('hidden');
        $('app-container').style.opacity = '1';
        setTimeout(() => $('page-loader').remove(), 300);

      } catch (err) {
        console.error(err);
        $('page-loader').innerHTML = `
          <div style="text-align:center;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:32px; color:#ef4444; margin-bottom:12px;"></i>
            <p style="color:#ef4444; font-weight:700;">Gagal memuat JSON</p>
          </div>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadData);

    function copyEmail() {
      const email = "vicky.setia@upertis.ac.id";
      navigator.clipboard.writeText(email).then(() => {
        const chip = document.getElementById("chip-notif");
        chip.style.display = "inline-block";
        requestAnimationFrame(() => { chip.style.opacity = "1"; chip.style.transform = "translate(-50%, 40px)"; });
        const check = chip.querySelector(".checkmark");
        check.classList.add("animate");
        setTimeout(() => check.classList.remove("animate"), 600);
        setTimeout(() => {
          chip.style.opacity = "0"; chip.style.transform = "translate(-50%, -30px)";
          setTimeout(() => { chip.style.display = "none"; }, 400); 
        }, 2000);
      });
    }

    // --- DOWNLOAD PDF DIRECT ---
    async function downloadPDFDirect() {
      const btnDesktop = $('btn-dl-desktop');
      const btnMobile = $('btn-dl-mobile');
      
      btnDesktop.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
      btnMobile.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

      try {
        const data = window.cvDataCache;
        if(!data) throw new Error('Data profil belum siap.');

        const template = document.getElementById('cv-pdf-template').content.cloneNode(true);
        const container = document.createElement('div');
        container.appendChild(template);
        
        container.querySelector('#pdf-nama').textContent = data.profil.nama || '-';
        container.querySelector('#pdf-prodi').textContent = "DOSEN PROGRAM STUDI " + (data.profil.nama_prodi || '-').toUpperCase();
        container.querySelector('#pdf-pt').textContent = "Universitas: " + (data.profil.nama_pt || '-');
        container.querySelector('#pdf-nidn').textContent = "NIDN: " + (data.profil.nidn || '-');

        const eduList = container.querySelector('#pdf-edu-list');
        if(data.pendidikan) {
          [...data.pendidikan].sort((a,b)=>String(b.tahun||"0").localeCompare(String(a.tahun||"0"))).forEach(item => {
            eduList.innerHTML += `<div class="pdf-row"><div class="pdf-main">${item.pt} <div style="font-size:9px; color:#4b5563; margin-top:2px;">${item.jenjang}</div></div><div class="pdf-side">Lulus ${item.tahun}</div></div>`;
          });
        }

        const teachList = container.querySelector('#pdf-teach-list');
        if(data.mengajar) {
          data.mengajar.forEach(kampus => {
            let h = `<div class="pdf-tree"><div class="pdf-uni-header"><i class="fa-solid fa-building-columns" style="margin-right:6px;"></i>${kampus.nama_kampus}</div>`;
            (kampus.mata_kuliah||[]).forEach(mk => {
              h += `<div class="pdf-course"><div class="pdf-main" style="padding-left:14px;">- ${mk.nama}</div><div class="pdf-side">Semester: ${mk.semester}</div></div>`;
            });
            teachList.innerHTML += h + `</div>`;
          });
        }

        const pubList = container.querySelector('#pdf-pub-list');
        if(data.publikasi) {
          data.publikasi.forEach(item => {
            const cite = (item.sitasi && item.sitasi!=='0') ? ` | ${item.sitasi} Sitasi` : '';
            pubList.innerHTML += `<div class="pdf-row"><div class="pdf-main">${item.judul}<div style="margin-top:2px;"><span class="pdf-badge">${item.jenis}</span><span style="font-size:8.5px; color:#4b5563;">${cite}</span></div></div><div class="pdf-side">${item.tahun}</div></div>`;
          });
        }

        const svcList = container.querySelector('#pdf-svc-list');
        if(data.pengabdian) {
          data.pengabdian.forEach(item => {
            svcList.innerHTML += `<div class="pdf-row"><div class="pdf-main">${item.judul}<div style="margin-top:2px;"><span class="pdf-badge">${item.kategori}</span></div></div><div class="pdf-side">${item.tahun}</div></div>`;
          });
        }

        container.style.cssText = 'position:absolute; left:-9999px; top:0; z-index:-99;';
        document.body.appendChild(container);
        await new Promise(r => setTimeout(r, 300)); 

        await html2pdf().set({
          margin:      [0.5, 0.5, 0.5, 0.5],
          filename:    'CV_Vicky_Setia_Gunawan.pdf',
          image:       { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, logging: false },
          jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(container).save();

        document.body.removeChild(container);
      } catch(err) {
        console.error(err);
        alert('Gagal mendownload PDF: ' + err.message);
      } finally {
        btnDesktop.innerHTML = '<i class="fa-solid fa-file-pdf"></i> Unduh CV PDF';
        btnMobile.innerHTML = '<i class="fa-solid fa-file-pdf"></i>';
      }
    }
  </script>
