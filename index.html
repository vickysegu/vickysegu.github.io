<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portofolio Akademik | Vicky Setia Gunawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Card utama - seperti panel profesional */
        .academic-card {
            max-width: 1280px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* Header profil */
        .profile-header {
            padding: 2rem 2.5rem 1.5rem 2.5rem;
            border-bottom: 1px solid #e9edf2;
            background: #ffffff;
        }

        .profile-row {
            display: flex;
            gap: 1.8rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .avatar-icon {
            width: 96px;
            height: 96px;
            background: #eef2ff;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: #1e4a76;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.1);
        }

        .identity h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #0f2b3d;
            margin-bottom: 0.25rem;
        }

        .prodi-badge {
            background: #eef2ff;
            color: #1e4a76;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            margin-top: 0.25rem;
        }

        .meta-details {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #475569;
        }

        .meta-details i {
            width: 1.2rem;
            color: #4b6e8a;
        }

        /* Pendidikan ringkas - tanpa emoji */
        .education-summary {
            background: #f8fafc;
            margin: 0 2rem 1rem 2rem;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: flex-start;
            border: 1px solid #eef2f8;
        }

        .edu-item {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
        }
        .edu-degree {
            font-weight: 700;
            color: #0c4a6e;
        }
        .edu-year {
            font-size: 0.75rem;
            color: #5b6e8c;
            margin-top: 0.2rem;
        }

        /* Tab navigasi */
        .tab-nav {
            display: flex;
            gap: 0.25rem;
            padding: 0 2rem;
            border-bottom: 1.5px solid #e9edf2;
            background: #ffffff;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 1rem 1.6rem 0.9rem 1.6rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #5b6e8c;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px solid transparent;
        }

        .tab-btn i {
            font-size: 1rem;
        }

        .tab-btn.active {
            color: #1f5e93;
            border-bottom-color: #1f5e93;
            background: #fafdff;
        }

        .tab-btn:hover:not(.active) {
            color: #2c3e66;
            background: #f8fafc;
        }

        /* Konten tab dengan scroll internal agar halaman tidak scroll penuh */
        .tab-content-container {
            padding: 1.8rem 2rem 2rem 2rem;
            background: #ffffff;
            max-height: 52vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        /* Item list */
        .list-item {
            border-bottom: 1px solid #edf2f7;
            padding: 1rem 0.2rem;
        }

        .item-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #0f2b3d;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: baseline;
        }

        .item-title a {
            color: #1f5e93;
            text-decoration: none;
            font-weight: 600;
        }
        .item-title a:hover {
            text-decoration: underline;
        }

        .year-badge {
            font-size: 0.7rem;
            font-weight: 600;
            background: #f1f5f9;
            padding: 0.2rem 0.7rem;
            border-radius: 1rem;
            color: #4b6b8f;
        }

        .item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #5f7d9c;
        }

        .tag {
            background: #eef2ff;
            padding: 0.2rem 0.7rem;
            border-radius: 1rem;
            font-weight: 500;
            color: #1e4a76;
        }

        .uni-sub {
            font-weight: 600;
            color: #2c5375;
            margin: 0.5rem 0 0.2rem 0;
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #8ba0bc;
            font-size: 0.85rem;
        }

        /* Scrollbar */
        .tab-content-container::-webkit-scrollbar {
            width: 5px;
        }
        .tab-content-container::-webkit-scrollbar-track {
            background: #eef2fa;
            border-radius: 10px;
        }
        .tab-content-container::-webkit-scrollbar-thumb {
            background: #cbddee;
            border-radius: 10px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            padding: 3rem;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #1f5e93;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tab pane */
        .tab-pane {
            display: none;
        }
        .tab-pane.active-pane {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .profile-header { padding: 1.5rem; }
            .tab-nav { padding: 0 1rem; }
            .tab-content-container { padding: 1.2rem; max-height: 60vh; }
            .education-summary { margin: 0 1rem 1rem 1rem; flex-direction: column; gap: 0.8rem; }
            .tab-btn { padding: 0.8rem 1rem; font-size: 0.8rem; }
        }

        @media print {
            body { background: white; padding: 0; }
            .academic-card { box-shadow: none; border-radius: 0; }
            .tab-nav, .loading { display: none; }
            .tab-pane { display: block !important; }
            .tab-content-container { max-height: none; overflow: visible; }
        }
    </style>
</head>
<body>

<div class="academic-card" id="app">
    <div id="loadingIndicator" class="loading">
        <div class="spinner"></div>
        <span>Memuat data akademik...</span>
    </div>

    <div id="mainContent" style="display: none;">
        <!-- Header -->
        <div class="profile-header">
            <div class="profile-row">
                <div class="avatar-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div class="identity">
                    <h1 id="dosenName">-</h1>
                    <div class="prodi-badge" id="prodiText">-</div>
                    <div class="meta-details">
                        <span><i class="fas fa-university"></i> <span id="ptName">-</span></span>
                        <span><i class="fas fa-id-card"></i> NIDN: <span id="nidnValue">-</span></span>
                        <span><i class="fas fa-globe"></i> <a href="https://visegu.my.id" target="_blank" style="color:#1f5e93; text-decoration:none;">visegu.my.id</a></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pendidikan ringkas -->
        <div class="education-summary" id="eduSummary"></div>

        <!-- Tab navigasi -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="teaching"><i class="fas fa-chalkboard"></i> Pengajaran</button>
            <button class="tab-btn" data-tab="research"><i class="fas fa-flask"></i> Penelitian</button>
            <button class="tab-btn" data-tab="community"><i class="fas fa-hand-sparkles"></i> Pengabdian</button>
        </div>

        <!-- Konten tab -->
        <div class="tab-content-container">
            <div id="tabTeaching" class="tab-pane active-pane"></div>
            <div id="tabResearch" class="tab-pane"></div>
            <div id="tabCommunity" class="tab-pane"></div>
        </div>
    </div>
</div>

<script>
    async function fetchData() {
        try {
            const res = await fetch('./data.json?t=' + Date.now());
            const json = await res.json();
            if (json.status === 'success') renderApp(json);
            else throw new Error();
        } catch(e) {
            document.getElementById('loadingIndicator').innerHTML = '<div class="empty-state">Gagal memuat data. Pastikan file data.json tersedia.</div>';
        }
    }

    function renderApp(data) {
        // Profil
        document.getElementById('dosenName').innerText = data.profil.nama || 'VICKY SETIA GUNAWAN';
        document.getElementById('prodiText').innerHTML = `Program Studi ${data.profil.nama_prodi || 'Bisnis Digital'}`;
        document.getElementById('ptName').innerText = data.profil.nama_pt || 'UNIVERSITAS PERINTIS INDONESIA';
        document.getElementById('nidnValue').innerText = data.profil.nidn || '-';

        // Pendidikan ringkas
        const eduDiv = document.getElementById('eduSummary');
        eduDiv.innerHTML = '';
        if (data.pendidikan && data.pendidikan.length) {
            data.pendidikan.sort((a,b) => (b.tahun||'').localeCompare(a.tahun||''));
            data.pendidikan.forEach(edu => {
                eduDiv.innerHTML += `
                    <div class="edu-item">
                        <span class="edu-degree">${edu.jenjang}</span> – ${edu.pt}
                        <div class="edu-year">Lulus ${edu.tahun}</div>
                    </div>
                `;
            });
        } else {
            eduDiv.innerHTML = '<div class="edu-item">Tidak ada data pendidikan</div>';
        }

        // Render Pengajaran
        const teachPane = document.getElementById('tabTeaching');
        teachPane.innerHTML = '';
        if (data.mengajar && data.mengajar.length) {
            data.mengajar.forEach(kampus => {
                const block = document.createElement('div');
                block.style.marginBottom = '1.2rem';
                block.innerHTML = `<div class="uni-sub"><i class="fas fa-building"></i> ${kampus.nama_kampus || 'Kampus'}</div>`;
                if (kampus.mata_kuliah && kampus.mata_kuliah.length) {
                    kampus.mata_kuliah.forEach(mk => {
                        block.innerHTML += `
                            <div class="list-item">
                                <div class="item-title">${mk.nama}</div>
                                <div class="item-meta"><i class="far fa-calendar-alt"></i> Semester: ${mk.semester || '-'}</div>
                            </div>
                        `;
                    });
                } else {
                    block.innerHTML += `<div class="list-item">Tidak ada mata kuliah tercatat</div>`;
                }
                teachPane.appendChild(block);
            });
        } else {
            teachPane.innerHTML = '<div class="empty-state">Belum ada riwayat mengajar</div>';
        }

        // Penelitian (dari publikasi)
        const researchPane = document.getElementById('tabResearch');
        researchPane.innerHTML = '';
        if (data.publikasi && data.publikasi.length) {
            data.publikasi.sort((a,b)=> (b.tahun||'').localeCompare(a.tahun||''));
            data.publikasi.forEach(pub => {
                const titleHtml = (pub.link && pub.link !== '') ? `<a href="${pub.link}" target="_blank">${pub.judul} <i class="fas fa-external-link-alt" style="font-size:0.7rem;"></i></a>` : pub.judul;
                researchPane.innerHTML += `
                    <div class="list-item">
                        <div class="item-title">
                            <span>${titleHtml}</span>
                            <span class="year-badge">${pub.tahun}</span>
                        </div>
                        <div class="item-meta">
                            <span class="tag">${pub.jenis || 'Publikasi'}</span>
                        </div>
                    </div>
                `;
            });
        } else {
            researchPane.innerHTML = '<div class="empty-state">Data penelitian belum tersedia</div>';
        }

        // Pengabdian
        const communityPane = document.getElementById('tabCommunity');
        communityPane.innerHTML = '';
        if (data.pengabdian && data.pengabdian.length) {
            data.pengabdian.forEach(act => {
                communityPane.innerHTML += `
                    <div class="list-item">
                        <div class="item-title">
                            <span>${act.judul}</span>
                            <span class="year-badge">${act.tahun}</span>
                        </div>
                        <div class="item-meta">
                            <span class="tag">${act.kategori || 'Pengabdian'}</span>
                        </div>
                    </div>
                `;
            });
        } else {
            communityPane.innerHTML = '<div class="empty-state">Tidak ada catatan pengabdian</div>';
        }

        // Sembunyikan loading, tampilkan konten
        document.getElementById('loadingIndicator').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        // Inisialisasi tab
        initTabs();
    }

    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        const panes = {
            teaching: document.getElementById('tabTeaching'),
            research: document.getElementById('tabResearch'),
            community: document.getElementById('tabCommunity')
        };

        function activate(tabId) {
            Object.values(panes).forEach(p => p.classList.remove('active-pane'));
            btns.forEach(btn => btn.classList.remove('active'));
            panes[tabId].classList.add('active-pane');
            const activeBtn = Array.from(btns).find(btn => btn.dataset.tab === tabId);
            if (activeBtn) activeBtn.classList.add('active');
        }

        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                if (tab === 'teaching') activate('teaching');
                else if (tab === 'research') activate('research');
                else if (tab === 'community') activate('community');
            });
        });
        activate('teaching');
    }

    fetchData();
</script>
</body>
</html>
