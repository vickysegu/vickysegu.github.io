<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Akademik - Dosen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-mut: #64748b;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-main); -webkit-font-smoothing: antialiased; }

        /* --- WEB LANDING PAGE UI --- */
        .navbar-brand-custom { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; }
        .btn-print { background-color: var(--primary); color: white; border-radius: 8px; font-weight: 600; padding: 0.5rem 1.2rem; transition: 0.2s; border: none; }
        .btn-print:hover { background-color: #1d4ed8; color: white; transform: translateY(-1px); }

        .hero-section { background: white; padding: 3rem 0; border-bottom: 1px solid #e2e8f0; }
        .profile-img-container { width: 120px; height: 120px; border-radius: 20px; overflow: hidden; border: 4px solid #eff6ff; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .profile-img-container i { font-size: 3.5rem; color: #cbd5e1; }
        
        .hero-name { font-weight: 800; font-size: 2rem; letter-spacing: -1px; margin-bottom: 0.2rem; }
        .hero-title { font-weight: 600; color: var(--primary); font-size: 1.1rem; }
        .hero-meta { color: var(--text-mut); font-size: 0.9rem; font-weight: 500; }

        .section-card { background: var(--surface); border-radius: 16px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); margin-bottom: 2rem; border: 1px solid #f1f5f9; }
        .section-title { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 2px solid #f1f5f9; }
        .section-title i { color: var(--primary); }

        /* Data Items */
        .edu-item { border-left: 2px solid #e2e8f0; padding-left: 1.2rem; margin-bottom: 1.5rem; position: relative; }
        .edu-item::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
        .edu-item:last-child { margin-bottom: 0; border-color: transparent; }
        
        .list-item { padding: 1rem 0; border-bottom: 1px dashed #e2e8f0; }
        .list-item:last-child { border-bottom: none; padding-bottom: 0; }
        .item-title { font-weight: 600; font-size: 1rem; line-height: 1.4; color: var(--text-main); text-decoration: none; display: block; }
        a.item-title:hover { color: var(--primary); }
        .item-meta { font-size: 0.85rem; color: var(--text-mut); margin-top: 0.4rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        
        .badge-tag { background: #eff6ff; color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 6px; font-weight: 600; font-size: 0.75rem; }

        /* --- CSS KHUSUS CETAK PDF / CV FORMAL --- */
        @media print {
            @page { size: A4; margin: 15mm; }
            body { background: white; color: black; font-family: 'Times New Roman', Times, serif; font-size: 11pt; padding: 0; }
            
            /* Sembunyikan Elemen Web */
            .navbar, .btn-print, .shadow, .badge-tag { display: none !important; }
            .section-card { box-shadow: none; border: none; padding: 0; margin-bottom: 15mm; border-radius: 0; }
            
            /* Format Teks Formal Cetak */
            .hero-section { padding: 0 0 10mm 0; border-bottom: 2px solid black; display: flex; align-items: center; }
            .profile-img-container { width: 3cm; height: 4cm; border-radius: 0; border: 1px solid black; margin-right: 20px; }
            .hero-name { font-size: 18pt; font-family: Arial, sans-serif; text-transform: uppercase; }
            .hero-title { color: black; font-size: 12pt; font-weight: normal; }
            .hero-meta { color: black; font-size: 10pt; }
            
            .section-title { font-family: Arial, sans-serif; font-size: 12pt; text-transform: uppercase; border-bottom: 1px solid black; padding-bottom: 2px; margin-bottom: 10px; color: black; }
            .section-title i { display: none; }
            
            .item-title { font-size: 11pt; color: black; display: inline; font-weight: bold; }
            .item-meta { font-size: 10pt; color: black; display: inline; margin-left: 5px; }
            .list-item { padding: 4px 0; border: none; display: list-item; margin-left: 15px; page-break-inside: avoid; }
            
            .edu-item { border: none; padding-left: 0; margin-bottom: 8px; }
            .edu-item::before { display: none; }
            
            /* Compact list styling for print */
            a { text-decoration: none !important; color: black !important; pointer-events: none; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom sticky-top d-print-none px-3">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand-custom"><i class="fa-solid fa-layer-group text-primary me-2"></i>Akademia</span>
        <button onclick="window.print()" class="btn-print"><i class="fa-solid fa-file-pdf me-2"></i>Cetak CV PDF</button>
    </div>
</nav>

<div id="loading" class="text-center py-5 d-print-none">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 text-muted fw-medium small">Memuat data akademik...</div>
</div>

<div id="app-content" style="display: none;">
    <div class="hero-section">
        <div class="container d-flex flex-column flex-md-row align-items-center align-items-md-start gap-4">
            <div class="profile-img-container">
                <img id="cv-photo" src="foto-profil.jpg" alt="Foto" onerror="this.style.display='none'; document.getElementById('avatar-icon').style.display='block';">
                <i id="avatar-icon" class="fa-solid fa-user-tie" style="display: none;"></i>
            </div>
            <div class="text-center text-md-start mt-2 mt-md-0">
                <h1 id="nama" class="hero-name">-</h1>
                <div id="prodi-title" class="hero-title mb-2">-</div>
                <div class="hero-meta d-flex flex-wrap justify-content-center justify-content-md-start gap-3">
                    <span><i class="fa-solid fa-building-columns me-2 opacity-75"></i><span id="pt"></span></span>
                    <span><i class="fa-solid fa-id-card me-2 opacity-75"></i>NIDN. <span id="nidn"></span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4 py-md-5">
        <div class="row g-4">
            
            <div class="col-lg-5">
                <div class="section-card">
                    <h3 class="section-title"><i class="fa-solid fa-graduation-cap"></i> Riwayat Pendidikan</h3>
                    <div id="list-pendidikan"></div>
                </div>

                <div class="section-card">
                    <h3 class="section-title"><i class="fa-solid fa-chalkboard-user"></i> Pengalaman Mengajar</h3>
                    <div id="list-mengajar"></div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="section-card">
                    <h3 class="section-title"><i class="fa-solid fa-book-open"></i> Publikasi & Karya Ilmiah</h3>
                    <div id="list-publikasi"></div>
                </div>

                <div class="section-card">
                    <h3 class="section-title"><i class="fa-solid fa-users-viewfinder"></i> Pengabdian & Internal</h3>
                    <div id="list-pengabdian"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    async function fetchData() {
        try {
            const response = await fetch('./data.json?t=' + new Date().getTime()); 
            const data = await response.json();
            
            if (data.status === 'success') {
                document.getElementById('nama').innerText = data.profil.nama || '-';
                document.getElementById('pt').innerText = data.profil.nama_pt || '-';
                document.getElementById('prodi-title').innerText = "Dosen Program Studi " + (data.profil.nama_prodi || '-');
                document.getElementById('nidn').innerText = data.profil.nidn || '-';
                
                // Render Pendidikan
                const eduContainer = document.getElementById('list-pendidikan');
                if (!data.pendidikan || data.pendidikan.length === 0) eduContainer.innerHTML = '<div class="text-muted small">Data belum tersedia.</div>';
                else {
                    data.pendidikan.forEach(item => {
                        eduContainer.innerHTML += `
                            <div class="edu-item">
                                <div class="fw-bold text-dark">${item.kampus}</div>
                                <div class="text-muted small fw-medium">${item.jenjang} - ${item.gelar} (${item.tahun})</div>
                            </div>`;
                    });
                }

                // Render Mengajar (Compact Layout)
                const teachContainer = document.getElementById('list-mengajar');
                if (!data.mengajar || data.mengajar.length === 0) teachContainer.innerHTML = '<div class="text-muted small">Data belum tersedia.</div>';
                else {
                    data.mengajar.forEach(item => {
                        teachContainer.innerHTML += `
                            <div class="list-item d-flex justify-content-between align-items-center">
                                <span class="fw-semibold small text-dark">${item.matkul}</span>
                                <span class="badge bg-light text-secondary border px-2 py-1" style="font-size:0.7rem; text-align:right;">${item.semester}</span>
                            </div>`;
                    });
                }

                // Render Publikasi
                const pubContainer = document.getElementById('list-publikasi');
                if (!data.publikasi || data.publikasi.length === 0) pubContainer.innerHTML = '<div class="text-muted small">Data belum tersedia.</div>';
                else {
                    data.publikasi.forEach(item => {
                        const isLink = item.link && item.link !== '';
                        const title = isLink ? `<a href="${item.link}" target="_blank" class="item-title">${item.judul} <i class="fa-solid fa-up-right-from-square ms-1" style="font-size:0.7rem;"></i></a>` : `<span class="item-title">${item.judul}</span>`;
                        const citation = item.sitasi && item.sitasi !== '0' ? `<span class="text-warning"><i class="fa-solid fa-star me-1"></i>${item.sitasi}</span>` : '';
                        
                        pubContainer.innerHTML += `
                            <div class="list-item">
                                ${title}
                                <div class="item-meta">
                                    <span class="badge-tag">${item.jenis}</span>
                                    <span><i class="fa-regular fa-calendar me-1"></i>${item.tahun}</span>
                                    ${citation}
                                </div>
                            </div>`;
                    });
                }

                // Render Pengabdian
                const svcContainer = document.getElementById('list-pengabdian');
                if (!data.pengabdian || data.pengabdian.length === 0) svcContainer.innerHTML = '<div class="text-muted small">Data belum tersedia.</div>';
                else {
                    data.pengabdian.forEach(item => {
                        svcContainer.innerHTML += `
                            <div class="list-item">
                                <span class="item-title">${item.judul}</span>
                                <div class="item-meta">
                                    <span class="badge-tag bg-success bg-opacity-10 text-success">${item.kategori}</span>
                                    <span><i class="fa-regular fa-calendar me-1"></i>${item.tahun}</span>
                                </div>
                            </div>`;
                    });
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            }
        } catch (error) { console.error(error); }
    }
    window.onload = fetchData;
</script>
</body>
</html>
