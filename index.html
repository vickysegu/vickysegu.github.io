<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Vicky Setia Gunawan — Liquid Glass Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    /* ══════════════════════════════════════════════════════════
       ROOT & RESET
    ══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-display: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-body:    'Plus Jakarta Sans', system-ui, sans-serif;

      /* Liquid Glass vars (Archis Vaze) */
      --tint-color:     255, 255, 255;
      --tint-opacity:   0.07;
      --shadow-blur:    24px;
      --shadow-spread:  -6px;
      --shadow-color:   rgba(255, 255, 255, 0.5);
      --outer-shadow-blur: 28px;
      --glass-radius:   28px;
      --accent:         #8b7cf7;
      --accent-rgb:     139, 124, 247;
      --accent2:        #4f8ef7;

      --text-primary:   #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --text-muted:     rgba(255, 255, 255, 0.45);

      --radius-xl:   28px;
      --radius-lg:   18px;
      --radius-md:   12px;
      --radius-pill: 999px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: 80px;
      /* Background from Archis Vaze source */
      background: #0a0a0f;
    }

    /* ══════════════════════════════════════════════════════════
       BACKGROUND LAYERS
    ══════════════════════════════════════════════════════════ */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
    }
    /* Subtle dark overlay so text is always readable */
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 15, 0.35);
    }

    /* WebGL canvas — renders the liquid glass refraction (Archis Vaze engine) */
    #gl {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Animated aurora blobs behind everything */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .aurora-blob:nth-child(1) { width: 600px; height: 600px; background: radial-gradient(circle, #8b7cf7, transparent); top: -10%; left: -10%; animation-duration: 20s; }
    .aurora-blob:nth-child(2) { width: 500px; height: 500px; background: radial-gradient(circle, #4f8ef7, transparent); top: 30%; right: -10%; animation-duration: 24s; animation-delay: -8s; }
    .aurora-blob:nth-child(3) { width: 400px; height: 400px; background: radial-gradient(circle, #c084fc, transparent); bottom: 0; left: 30%; animation-duration: 28s; animation-delay: -4s; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px, 30px) scale(1.1); } }

    /* ══════════════════════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════════════════════ */
    .page-wrap {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 44px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ══════════════════════════════════════════════════════════
       LIQUID GLASS ENGINE (Archis Vaze CSS implementation)
       Applied to every .glass element
    ══════════════════════════════════════════════════════════ */
    .glass {
      position: relative;
      isolation: isolate;
      border-radius: var(--glass-radius);

      /* Core refraction engine */
      backdrop-filter: blur(44px) saturate(1.6) brightness(1.05);
      -webkit-backdrop-filter: blur(44px) saturate(1.6) brightness(1.05);

      /* Tint layer */
      background-color: rgba(var(--tint-color), var(--tint-opacity));

      /* Outer drop shadow */
      box-shadow:
        0 8px var(--outer-shadow-blur) rgba(0,0,0,0.28),
        0 1px 0 rgba(255,255,255,0.15) inset,
        0 -1px 0 rgba(0,0,0,0.12) inset;

      /* Specular border — top/left brighter (light from upper-left) */
      border: 1px solid rgba(255,255,255,0.11);
      border-top-color:  rgba(255,255,255,0.28);
      border-left-color: rgba(255,255,255,0.2);
      border-bottom-color: rgba(0,0,0,0.08);

      transition: transform 0.4s cubic-bezier(0.32,0.72,0,1), box-shadow 0.4s ease;
    }

    /* Inner inset glow — the "3D depth" trick from Archis Vaze */
    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: inherit;
      box-shadow: inset 0 0 var(--shadow-blur) var(--shadow-spread) var(--shadow-color);
      pointer-events: none;
    }

    /* Prismatic rim — subtle rainbow edge on hover */
    .glass::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      border-radius: inherit;
      opacity: 0;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.06) 0%,
        rgba(138,124,247,0.04) 40%,
        rgba(79,142,247,0.04) 80%,
        transparent 100%);
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .glass:hover::after { opacity: 1; }
    .glass:hover {
      transform: translateY(-3px);
      box-shadow:
        0 16px 40px rgba(0,0,0,0.38),
        0 1px 0 rgba(255,255,255,0.18) inset;
    }

    /* ══════════════════════════════════════════════════════════
       PROFILE CARD
    ══════════════════════════════════════════════════════════ */
    .profile-card {
      padding: 36px 40px;
      display: flex;
      gap: 32px;
      align-items: center;
      animation: fadeUp 0.7s cubic-bezier(0.32,0.72,0,1) both;
    }

    .avatar-ring {
      flex-shrink: 0;
      width: 104px; height: 104px;
      border-radius: 50%;
      background: conic-gradient(from 135deg, var(--accent), var(--accent2), #c084fc, var(--accent));
      padding: 3px;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.07), 0 8px 24px rgba(139,124,247,0.35);
      position: relative; z-index: 2;
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: rgba(14,14,22,0.55);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.7rem; color: rgba(255,255,255,0.85);
    }

    .profile-info { flex: 1; min-width: 0; position: relative; z-index: 2; }

    .profile-name {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .profile-role {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      opacity: 0.9;
    }

    .profile-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.14);
      border-top-color: rgba(255,255,255,0.22);
      border-radius: var(--radius-pill);
      font-size: 0.76rem; font-weight: 600;
      color: var(--text-secondary);
      backdrop-filter: blur(8px);
    }
    .chip i { color: var(--accent); font-size: 0.7rem; }

    .profile-bio {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text-secondary);
      max-width: 560px;
    }

    /* ══════════════════════════════════════════════════════════
       DOWNLOAD BUTTON
    ══════════════════════════════════════════════════════════ */
    .btn-download {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 12px 26px;
      background: rgba(var(--accent-rgb), 0.18);
      border: 1px solid rgba(var(--accent-rgb), 0.35);
      border-top-color: rgba(var(--accent-rgb), 0.55);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 700;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(16px);
      transition: all 0.25s cubic-bezier(0.32,0.72,0,1);
      flex-shrink: 0;
      align-self: flex-start;
      position: relative; z-index: 2;
    }
    .btn-download:hover {
      transform: scale(1.05) translateY(-1px);
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(var(--accent-rgb), 0.45);
    }
    .btn-download:active { transform: scale(0.97); }
    .btn-download.loading .dl-icon::before {
      content: '\f110';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      animation: spin 0.9s linear infinite;
      display: inline-block;
    }

    /* ══════════════════════════════════════════════════════════
       SECTION LABEL
    ══════════════════════════════════════════════════════════ */
    .section-label {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
      position: relative; z-index: 2;
    }
    .section-label .label-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: rgba(var(--accent-rgb), 0.18);
      border: 1px solid rgba(var(--accent-rgb), 0.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      font-size: 0.88rem;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════════════════
       GLASS CARD ITEMS (nested cards inside sections)
    ══════════════════════════════════════════════════════════ */
    .glass-card-item {
      padding: 18px 20px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.09);
      border-top-color: rgba(255,255,255,0.18);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(12px);
      transition: all 0.25s cubic-bezier(0.32,0.72,0,1);
      position: relative;
    }
    .glass-card-item::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      pointer-events: none;
    }
    .glass-card-item:hover {
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* ══════════════════════════════════════════════════════════
       EDUCATION GRID
    ══════════════════════════════════════════════════════════ */
    .edu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; position: relative; z-index: 2; }
    .edu-degree { display: inline-block; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .edu-uni { font-size: 0.88rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .edu-prodi { font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .edu-year { font-size: 0.73rem; color: var(--text-muted); }

    /* ══════════════════════════════════════════════════════════
       STATS BAR
    ══════════════════════════════════════════════════════════ */
    .stats-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 24px;
      position: relative; z-index: 2;
    }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.2);
      border-radius: var(--radius-pill);
      font-size: 0.8rem; font-weight: 600;
      color: var(--text-secondary);
      backdrop-filter: blur(12px);
    }
    .stat-pill .stat-num { font-size: 1.05rem; font-weight: 800; color: #fff; }
    .stat-pill i { color: var(--accent); font-size: 0.78rem; }

    /* ══════════════════════════════════════════════════════════
       TABS
    ══════════════════════════════════════════════════════════ */
    .tab-bar {
      display: flex; gap: 5px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-pill);
      padding: 5px;
      margin-bottom: 22px;
      position: relative; z-index: 2;
    }
    .tab-btn {
      flex: 1; padding: 10px 14px;
      border: none; border-radius: var(--radius-pill);
      background: transparent; color: var(--text-muted);
      font-family: var(--font-body); font-size: 0.84rem; font-weight: 600;
      cursor: pointer; transition: all 0.28s cubic-bezier(0.32,0.72,0,1);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .tab-btn.active {
      background: rgba(255,255,255,0.14);
      color: #fff;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.22),
        0 1px 8px rgba(0,0,0,0.2);
    }
    .tab-btn:not(.active):hover { color: var(--text-secondary); background: rgba(255,255,255,0.06); }
    .tab-pane { display: none; position: relative; z-index: 2; }
    .tab-pane.active { display: block; animation: fadeUp 0.32s cubic-bezier(0.32,0.72,0,1) both; }

    /* ══════════════════════════════════════════════════════════
       TEACHING & COURSES
    ══════════════════════════════════════════════════════════ */
    .campus-block { margin-bottom: 22px; }
    .campus-label {
      font-size: 0.74rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .campus-label i { color: var(--accent); font-size: 0.8rem; }
    .course-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .course-name { font-size: 0.86rem; font-weight: 600; color: #fff; margin-bottom: 5px; }
    .course-sem { font-size: 0.73rem; color: var(--text-muted); }

    /* ══════════════════════════════════════════════════════════
       PUBLICATIONS & PENGABDIAN
    ══════════════════════════════════════════════════════════ */
    .pub-list { display: flex; flex-direction: column; gap: 10px; }
    .pub-item { display: flex; align-items: flex-start; gap: 14px; }
    .pub-year-badge {
      flex-shrink: 0; width: 48px; height: 48px; border-radius: 12px;
      background: rgba(var(--accent-rgb), 0.12);
      border: 1px solid rgba(var(--accent-rgb), 0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800; color: var(--accent);
    }
    .pub-body { flex: 1; min-width: 0; }
    .pub-title { font-size: 0.88rem; font-weight: 600; line-height: 1.45; color: #fff; margin-bottom: 8px; }
    .pub-title a { color: #fff; text-decoration: none; transition: color 0.2s; }
    .pub-title a:hover { color: var(--accent); }
    .pub-meta { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag {
      padding: 3px 11px; border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.13);
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em;
      color: var(--text-muted); text-transform: uppercase;
    }
    .cite-badge { background: rgba(var(--accent-rgb), 0.18); color: #d8b4fe; border-color: rgba(var(--accent-rgb), 0.35); }

    /* ══════════════════════════════════════════════════════════
       PAGE LOADER
    ══════════════════════════════════════════════════════════ */
    #page-loader {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #06060f;
      gap: 16px;
    }
    .loader-ring {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    .loader-text {
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }
    #page-loader.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }

    /* ══════════════════════════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════════════════════════ */
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    .page-wrap > * {
      animation: fadeUp 0.6s cubic-bezier(0.32,0.72,0,1) both;
    }
    .page-wrap > *:nth-child(1) { animation-delay: 0.05s; }
    .page-wrap > *:nth-child(2) { animation-delay: 0.12s; }
    .page-wrap > *:nth-child(3) { animation-delay: 0.19s; }

    /* ══════════════════════════════════════════════════════════
       SECTION CARD PADDING
    ══════════════════════════════════════════════════════════ */
    .section-card {
      padding: 28px 34px;
    }

    /* ══════════════════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════════════════ */
    @media (max-width: 640px) {
      .profile-card { flex-direction: column; text-align: center; padding: 28px 22px; }
      .profile-chips { justify-content: center; }
      .profile-bio { max-width: 100%; }
      .btn-download { align-self: center; }
      .edu-grid, .course-grid { grid-template-columns: 1fr; }
      .tab-btn .tab-text { display: none; }
      .section-card { padding: 22px 18px; }
    }
    @media (max-width: 400px) {
      .stat-pill { padding: 8px 12px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- ── BACKGROUND LAYERS ── -->
  <div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
  </div>
  <div id="bg"></div>

  <!-- ── WEBGL LIQUID GLASS CANVAS (Archis Vaze engine) ── -->
  <canvas id="gl"></canvas>

  <!-- ── LOADER ── -->
  <div id="page-loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Memuat profil liquid glass…</div>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <div class="page-wrap" id="main-content" style="opacity:0;">

    <!-- PROFILE CARD -->
    <div class="glass profile-card" id="card-profile">
      <div class="avatar-ring">
        <div class="avatar-inner">
          <i class="fa-solid fa-user-tie"></i>
        </div>
      </div>

      <div class="profile-info">
        <div class="profile-name" id="prof-name">—</div>
        <div class="profile-role" id="prof-role">—</div>
        <div class="profile-chips" id="prof-chips"></div>
        <div class="profile-bio">
          Dosen aktif di bidang Bisnis Digital dengan keahlian dalam pengembangan sistem informasi,
          kecerdasan buatan, dan pemrograman web. Berpengalaman mengajar di dua perguruan tinggi dan
          aktif berkontribusi melalui penelitian, pengabdian, serta publikasi ilmiah.
        </div>
      </div>

      <button class="btn-download" id="btn-dl" onclick="downloadPDF()">
        <i class="fa-solid fa-arrow-down-to-line dl-icon"></i>
        <span>Unduh CV</span>
      </button>
    </div>

    <!-- PENDIDIKAN -->
    <div class="glass section-card">
      <div class="section-label">
        <span class="label-icon"><i class="fa-solid fa-graduation-cap"></i></span>
        Pendidikan
      </div>
      <div class="edu-grid" id="edu-grid"></div>
    </div>

    <!-- AKTIVITAS (tabs) -->
    <div class="glass section-card">
      <div class="stats-bar" id="stats-bar"></div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('teaching', this)">
          <i class="fa-solid fa-chalkboard-user"></i>
          <span class="tab-text">Pengajaran</span>
        </button>
        <button class="tab-btn" onclick="switchTab('research', this)">
          <i class="fa-solid fa-book-open"></i>
          <span class="tab-text">Publikasi</span>
        </button>
        <button class="tab-btn" onclick="switchTab('service', this)">
          <i class="fa-solid fa-handshake-angle"></i>
          <span class="tab-text">Pengabdian</span>
        </button>
      </div>

      <div class="tab-pane active" id="tab-teaching">
        <div id="teaching-content"></div>
      </div>
      <div class="tab-pane" id="tab-research">
        <div class="pub-list" id="research-content"></div>
      </div>
      <div class="tab-pane" id="tab-service">
        <div class="pub-list" id="service-content"></div>
      </div>
    </div>

  </div><!-- /.page-wrap -->

  <!-- ════════════════════════════════════════════════════════
       WEBGL LIQUID GLASS ENGINE — Archis Vaze (archisvaze/liquid-glass)
       Renders a floating ambient glass orb that refracts the background.
  ════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    /* ── State ── */
    const state = {
      x: window.innerWidth * 0.78,
      y: window.innerHeight * 0.22,
      gw: Math.min(320, window.innerWidth * 0.38),
      gh: Math.min(220, window.innerHeight * 0.28),
      gr: 80,
      thick: 60,
      bezel: 70,
      ior: 2.8,
      blur: 1.2,
      spec: 0.6,
      tint: 0.06,
      shadow: 0.45,
    };

    const canvas = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    /* ── Load background texture ── */
    const bgUrl = 'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop';
    document.getElementById('bg').style.backgroundImage = "url('" + bgUrl + "')";
    document.getElementById('bg').style.backgroundSize = 'cover';
    document.getElementById('bg').style.backgroundPosition = 'center';

    /* ── Shaders (from Archis Vaze webgl.html, verbatim) ── */
    const vertexShader = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}`;

    const fragmentShader = `
precision highp float;
varying vec2 vUv;
uniform vec2  uResolution;
uniform vec2  uGlassCenter;
uniform vec2  uGlassSize;
uniform float uRadius;
uniform float uBezel;
uniform float uThickness;
uniform float uIOR;
uniform float uBlur;
uniform float uSpecular;
uniform float uTint;
uniform float uShadow;
uniform sampler2D uBgTex;
uniform float uBgAspect;

float sdRoundedRect(vec2 p, vec2 halfSize, float r) {
  vec2 q = abs(p) - halfSize + r;
  return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
}

float surfaceHeight(float t) {
  float s = 1.0 - t;
  return pow(1.0 - s*s*s*s, 0.25);
}

vec3 sampleBg(vec2 screenUV) {
  float screenAspect = uResolution.x / uResolution.y;
  vec2 uv = screenUV;
  if (uBgAspect > screenAspect) {
    float s = screenAspect / uBgAspect;
    uv.x = uv.x * s + (1.0 - s) * 0.5;
  } else {
    float s = uBgAspect / screenAspect;
    uv.y = uv.y * s + (1.0 - s) * 0.5;
  }
  uv.y = 1.0 - uv.y;
  return texture2D(uBgTex, uv).rgb;
}

vec3 sampleBgBlurred(vec2 uv, float radius) {
  if (radius < 0.5) return sampleBg(uv);
  vec3 sum = vec3(0.0);
  vec2 px = 1.0 / uResolution;
  vec2 offsets[16];
  offsets[0]  = vec2(-0.94201,-0.39906); offsets[1]  = vec2( 0.94558,-0.76890);
  offsets[2]  = vec2(-0.09418,-0.92938); offsets[3]  = vec2( 0.34495, 0.29387);
  offsets[4]  = vec2(-0.91588,-0.45771); offsets[5]  = vec2(-0.81544, 0.48568);
  offsets[6]  = vec2(-0.38277,-0.56071); offsets[7]  = vec2(-0.12675, 0.84686);
  offsets[8]  = vec2( 0.89642, 0.41254); offsets[9]  = vec2( 0.18150,-0.30020);
  offsets[10] = vec2(-0.01445,-0.16001); offsets[11] = vec2( 0.59614, 0.71118);
  offsets[12] = vec2( 0.49742,-0.47280); offsets[13] = vec2( 0.80685, 0.04588);
  offsets[14] = vec2(-0.32490,-0.03965); offsets[15] = vec2(-0.60975, 0.06566);
  for (int i = 0; i < 16; i++) {
    sum += sampleBg(uv + offsets[i] * radius * px);
  }
  return sum / 16.0;
}

void main() {
  vec2 screenPx = vec2(vUv.x, 1.0 - vUv.y) * uResolution;
  vec2 p = screenPx - uGlassCenter;
  vec2 halfSize = uGlassSize * 0.5;

  float sd = sdRoundedRect(p, halfSize, uRadius);

  if (sd > 0.0) {
    float shadowFalloff = exp(-sd * sd / 800.0);
    float shadowAlpha = uShadow * shadowFalloff * 0.55;
    gl_FragColor = vec4(0.0, 0.0, 0.0, shadowAlpha);
    return;
  }

  float distFromEdge = -sd;
  float bezel = min(uBezel, min(uRadius, min(halfSize.x, halfSize.y)) - 1.0);
  float t = clamp(distFromEdge / bezel, 0.0, 1.0);

  float h  = surfaceHeight(t);
  float dt = 0.001;
  float h2 = surfaceHeight(min(t + dt, 1.0));
  float dh = (h2 - h) / dt;

  float slopeAngle = atan(dh * (uThickness / bezel));
  float sinR = sin(slopeAngle) / uIOR;
  sinR = clamp(sinR, -1.0, 1.0);
  float thetaR = asin(sinR);
  float displacement = h * uThickness * (tan(slopeAngle) - tan(thetaR));

  vec2 grad;
  float eps = 0.5;
  grad.x = sdRoundedRect(p + vec2(eps, 0.0), halfSize, uRadius) - sd;
  grad.y = sdRoundedRect(p + vec2(0.0, eps), halfSize, uRadius) - sd;
  grad = normalize(grad);

  vec2 offset = -grad * displacement / uResolution;
  vec2 screenUV = screenPx / uResolution;
  vec2 refractedUV = screenUV + offset;
  vec3 color = sampleBgBlurred(refractedUV, uBlur);

  vec2 lightDir = normalize(vec2(0.5, -0.7));
  float rimDot = abs(dot(grad, lightDir));
  float rimFalloff = 1.0 - smoothstep(0.0, bezel * 0.4, distFromEdge);
  float specHighlight = pow(rimDot * rimFalloff, 1.5);
  color += vec3(specHighlight * uSpecular);

  float innerShadow = 1.0 - smoothstep(0.0, bezel * 0.6, distFromEdge);
  color *= mix(1.0, 0.7, innerShadow * 0.3);

  float innerRim = smoothstep(0.0, 2.0, distFromEdge) * (1.0 - smoothstep(2.0, 5.0, distFromEdge));
  color += vec3(innerRim * 0.15 * uSpecular);

  color = mix(color, vec3(1.0), uTint);

  float alpha = smoothstep(0.0, 1.5, distFromEdge);
  gl_FragColor = vec4(color, alpha);
}`;

    /* ── Material ── */
    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uResolution:  { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        uGlassCenter: { value: new THREE.Vector2(state.x, state.y) },
        uGlassSize:   { value: new THREE.Vector2(state.gw, state.gh) },
        uRadius:      { value: state.gr },
        uBezel:       { value: state.bezel },
        uThickness:   { value: state.thick },
        uIOR:         { value: state.ior },
        uBlur:        { value: state.blur },
        uSpecular:    { value: state.spec },
        uTint:        { value: state.tint },
        uShadow:      { value: state.shadow },
        uBgTex:       { value: null },
        uBgAspect:    { value: 1.5 },
      },
      transparent: true,
      depthTest:   false,
    });

    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

    /* ── Load texture ── */
    new THREE.TextureLoader().load(bgUrl, (tex) => {
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      material.uniforms.uBgTex.value    = tex;
      material.uniforms.uBgAspect.value = tex.image.width / tex.image.height;
    });

    /* ── Gentle ambient float animation ── */
    let t0 = performance.now();
    const baseX = state.x, baseY = state.y;

    function render(now) {
      const t = (now - t0) / 1000;
      /* Slow sinusoidal drift — purely decorative ambient motion */
      state.x = baseX + Math.sin(t * 0.18) * 18;
      state.y = baseY + Math.cos(t * 0.13) * 12;

      const u = material.uniforms;
      u.uResolution.value.set(window.innerWidth, window.innerHeight);
      u.uGlassCenter.value.set(state.x, state.y);
      u.uGlassSize.value.set(state.gw, state.gh);
      u.uRadius.value    = state.gr;
      u.uBezel.value     = state.bezel;
      u.uThickness.value = state.thick;
      u.uIOR.value       = state.ior;
      u.uBlur.value      = state.blur;
      u.uSpecular.value  = state.spec;
      u.uTint.value      = state.tint;
      u.uShadow.value    = state.shadow;
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      /* Reposition orb proportionally on resize */
      state.x  = window.innerWidth  * 0.78;
      state.gw = Math.min(320, window.innerWidth  * 0.38);
      state.gh = Math.min(220, window.innerHeight * 0.28);
    });
  })();
  </script>

  <!-- ════════════════════════════════════════════════════════
       APP LOGIC (unchanged from original)
  ════════════════════════════════════════════════════════ -->
  <script>
  const $ = id => document.getElementById(id);

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    $('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  async function loadData() {
    try {
      const res  = await fetch('./data.json?t=' + Date.now());
      const data = await res.json();
      if (data.status !== 'success') throw new Error('Bad status');

      const p = data.profil;

      $('prof-name').textContent = p.nama || '—';
      $('prof-role').textContent = `Dosen – ${p.nama_prodi || ''}`;

      $('prof-chips').innerHTML = [
        { icon: 'fa-university', text: p.nama_pt   || '' },
        { icon: 'fa-id-badge',   text: 'NIDN ' + (p.nidn || '') },
        { icon: 'fa-briefcase',  text: p.nama_prodi || '' },
      ].map(c => `<span class="chip"><i class="fa-solid ${c.icon}"></i>${c.text}</span>`).join('');

      /* Education */
      const sorted = [...(data.pendidikan || [])].sort((a, b) => +b.tahun - +a.tahun);
      $('edu-grid').innerHTML = sorted.map(e => {
        const prodiLine = (e.prodi && e.prodi !== 'N/A')
          ? `<div class="edu-prodi"><i class="fa-solid fa-layer-group" style="font-size:.63rem;margin-right:4px;"></i>${e.prodi}</div>`
          : '';
        return `
        <div class="glass-card-item">
          <div class="edu-degree">${e.jenjang}</div>
          <div class="edu-uni">${e.pt}</div>
          ${prodiLine}
          <div class="edu-year"><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>Lulus ${e.tahun}</div>
        </div>`;
      }).join('');

      /* Teaching */
      const tc = $('teaching-content');
      if (!data.mengajar || !data.mengajar.length) {
        tc.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        tc.innerHTML = data.mengajar.map(kampus => {
          const courses = (kampus.mata_kuliah || []).map(mk => `
            <div class="glass-card-item">
              <div class="course-name">${mk.nama}</div>
              <div class="course-sem"><i class="fa-regular fa-calendar-check" style="margin-right:4px;"></i>${mk.semester}</div>
            </div>`).join('');
          return `
            <div class="campus-block">
              <div class="campus-label"><i class="fa-solid fa-landmark"></i>${kampus.nama_kampus}</div>
              <div class="course-grid">${courses}</div>
            </div>`;
        }).join('');
      }

      /* Publications + Stats */
      const rc = $('research-content');
      if (!data.publikasi || !data.publikasi.length) {
        rc.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        const totalSitasi      = data.publikasi.reduce((acc, pub) => { const n = parseInt(pub.sitasi||'0',10); return acc+(isNaN(n)?0:n); }, 0);
        const totalPub         = data.publikasi.length;
        const totalMengajar    = (data.mengajar||[]).reduce((a,k)=>a+(k.mata_kuliah||[]).length,0);
        const totalPengabdian  = (data.pengabdian||[]).length;

        $('stats-bar').innerHTML = [
          { icon:'fa-book-open',       num:totalPub,        label:'Publikasi'   },
          { icon:'fa-star',            num:totalSitasi,     label:'Sitasi'      },
          { icon:'fa-chalkboard-user', num:totalMengajar,   label:'Matkul'      },
          { icon:'fa-handshake-angle', num:totalPengabdian, label:'Pengabdian'  },
        ].map(s => `
          <div class="stat-pill">
            <i class="fa-solid ${s.icon}"></i>
            <span class="stat-num">${s.num}</span>
            <span>${s.label}</span>
          </div>`).join('');

        rc.innerHTML = data.publikasi.map(pub => {
          const titleInner = pub.link
            ? `<a href="${pub.link}" target="_blank">${pub.judul} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;margin-left:4px;opacity:.55;"></i></a>`
            : pub.judul;
          const sitasiNum = parseInt(pub.sitasi||'0',10);
          const citeBadge = sitasiNum > 0
            ? `<span class="tag cite-badge"><i class="fa-solid fa-star" style="margin-right:3px;"></i>${sitasiNum} Sitasi</span>`
            : '';
          return `
            <div class="glass-card-item pub-item">
              <div class="pub-year-badge">${pub.tahun}</div>
              <div class="pub-body">
                <div class="pub-title">${titleInner}</div>
                <div class="pub-meta">
                  <span class="tag">${pub.jenis}</span>
                  ${citeBadge}
                </div>
              </div>
            </div>`;
        }).join('');
      }

      /* Pengabdian */
      const sc = $('service-content');
      if (!data.pengabdian || !data.pengabdian.length) {
        sc.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        sc.innerHTML = data.pengabdian.map(item => `
          <div class="glass-card-item pub-item">
            <div class="pub-year-badge">${item.tahun}</div>
            <div class="pub-body">
              <div class="pub-title">${item.judul}</div>
              <div class="pub-meta">
                <span class="tag" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.1);">${item.kategori}</span>
              </div>
            </div>
          </div>`).join('');
      }

      /* Reveal */
      const loader = $('page-loader');
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 500);
      const main = $('main-content');
      main.style.transition = 'opacity 0.55s ease';
      main.style.opacity = '1';

    } catch (err) {
      console.error(err);
      $('page-loader').innerHTML = `
        <div style="text-align:center;">
          <i class="fa-solid fa-circle-exclamation" style="font-size:2.4rem;color:#ef4444;margin-bottom:12px;"></i>
          <p style="color:#ef4444;font-weight:700;">Gagal memuat data.<br>Pastikan data.json tersedia.</p>
        </div>`;
    }
  }

  async function downloadPDF() {
    const btn = $('btn-dl');
    if (btn.classList.contains('loading')) return;
    btn.classList.add('loading');
    btn.querySelector('span').textContent = 'Menyiapkan…';
    try {
      const res = await fetch('./cv.html');
      if (!res.ok) throw new Error('Fetch cv.html failed: ' + res.status);
      const html = await res.text();
      const container = document.createElement('div');
      container.style.cssText = 'position:absolute;left:-9999px;top:0;width:210mm;';
      container.innerHTML = html;
      document.body.appendChild(container);
      await new Promise(r => setTimeout(r, 600));
      await html2pdf().set({
        margin:      [0.5, 0.5, 0.5, 0.5],
        filename:    'CV_Vicky_Setia_Gunawan.pdf',
        image:       { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:   { mode: ['avoid-all', 'css'] },
      }).from(container).save();
      document.body.removeChild(container);
    } catch (err) {
      console.error(err);
      alert('Gagal mengunduh CV. Pastikan file cv.html tersedia.');
    } finally {
      btn.classList.remove('loading');
      btn.querySelector('span').textContent = 'Unduh CV';
    }
  }

  window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
