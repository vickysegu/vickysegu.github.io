<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Vicky Setia Gunawan — Liquid Glass Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* ══════════════════════════════════════════════
       ROOT — Smoked Liquid Glass Variables
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;

      /* KOREKSI KETERBACAAN: Menggunakan Smoked Glass (Gelap transparan) */
      --tint-color:       15, 23, 42;  /* Slate 900 untuk kontras tinggi */
      --tint-opacity:     0.45;        /* Opasitas dinaikkan agar teks putih terbaca jelas */
      --shadow-blur:      24px;
      --shadow-spread:    -5px;
      --shadow-color:     rgba(0, 0, 0, 0.50);
      --outer-shadow-blur: 30px;
      --glass-radius:     28px;
      --accent:           #60a5fa;     /* Biru terang agar kontras dengan kaca gelap */
      --accent-rgb:       96, 165, 250;

      --text-primary:   #ffffff;
      --text-secondary: rgba(255,255,255,0.85);
      --text-muted:     rgba(255,255,255,0.65);
      --radius-pill:    999px;
      --radius-lg:      18px;
      --radius-md:      12px;
    }

    html { scroll-behavior: smooth; }

    /* ══════════════════════════════════════════════
       BODY + BACKGROUND (Placeholder bg.png)
    ══════════════════════════════════════════════ */
    body {
      font-family: var(--font);
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: 80px;
      /* Background Placeholder: bg.png (dengan warna fallback gelap) */
      background: #1e1e2f url('bg.png') center/cover no-repeat fixed;
    }

    /* ══════════════════════════════════════════════
       LIQUID GLASS ENGINE (Smoked Version)
    ══════════════════════════════════════════════ */
    .glass {
      position: relative;
      isolation: isolate;
      border-radius: var(--glass-radius);

      background-color: rgba(var(--tint-color), var(--tint-opacity));
      backdrop-filter: blur(28px) saturate(1.2);
      -webkit-backdrop-filter: blur(28px) saturate(1.2);

      box-shadow:
        0 10px var(--outer-shadow-blur) rgba(0,0,0,0.4),
        0 2px 6px rgba(0,0,0,0.2);
      
      border: 1px solid rgba(255,255,255,0.15);
      border-top-color:  rgba(255,255,255,0.25);
      border-left-color: rgba(255,255,255,0.20);
      border-bottom-color: rgba(0,0,0,0.3);
      border-right-color:  rgba(0,0,0,0.2);

      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1), box-shadow 0.38s ease;
    }

    .glass::before {
      content: ''; position: absolute; inset: 0; z-index: 1; border-radius: inherit;
      box-shadow: inset 0 0 var(--shadow-blur) var(--shadow-spread) var(--shadow-color);
      pointer-events: none;
    }

    .glass::after {
      content: ''; position: absolute; inset: 0; z-index: 2; border-radius: inherit;
      background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, transparent 40%, rgba(0,0,0,0.1) 100%);
      backdrop-filter: url(#liquid-glass-filter);
      -webkit-backdrop-filter: url(#liquid-glass-filter);
      pointer-events: none;
    }

    .glass:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
    }

    /* ══════════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════════ */
    .page-wrap {
      position: relative; z-index: 1; max-width: 900px;
      margin: 0 auto; padding: 40px 20px 0;
      display: flex; flex-direction: column; gap: 20px;
    }

    .page-wrap > * { animation: fadeUp 0.65s cubic-bezier(0.32,0.72,0,1) both; }
    .page-wrap > *:nth-child(1) { animation-delay: 0.05s; }
    .page-wrap > *:nth-child(2) { animation-delay: 0.14s; }
    .page-wrap > *:nth-child(3) { animation-delay: 0.22s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ══════════════════════════════════════════════
       PROFILE CARD
    ══════════════════════════════════════════════ */
    .profile-card { padding: 36px 40px; display: flex; gap: 30px; align-items: center; }

    .avatar-ring {
      flex-shrink: 0; width: 110px; height: 110px; border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), #4f8ef7, #8b7cf7, var(--accent));
      padding: 4px; position: relative; z-index: 3;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05), 0 10px 24px rgba(0,0,0,0.4);
    }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: rgba(15,23,42,0.6);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-inner i { font-size: 2.8rem; color: rgba(255,255,255,0.7); }

    .profile-info { flex: 1; min-width: 0; position: relative; z-index: 3; }

    .profile-name {
      font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 800; letter-spacing: -0.025em;
      color: #fff; line-height: 1.1; margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6); /* Text shadow agar terbaca jelas */
    }
    .profile-role {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px; text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .profile-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-pill); font-size: 0.75rem; font-weight: 600;
      color: var(--text-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .chip i { color: var(--accent); font-size: 0.7rem; }
    .profile-bio {
      font-size: 0.9rem; line-height: 1.6; color: var(--text-secondary);
      max-width: 580px; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    /* ── Download button ── */
    .btn-download {
      display: inline-flex; align-items: center; gap: 9px; padding: 12px 24px;
      background: rgba(var(--accent-rgb), 0.2); border: 1px solid rgba(var(--accent-rgb), 0.4);
      border-radius: var(--radius-pill); backdrop-filter: blur(10px);
      font-family: var(--font); font-size: 0.85rem; font-weight: 700; color: #fff;
      cursor: pointer; transition: all 0.25s cubic-bezier(0.32,0.72,0,1);
      flex-shrink: 0; align-self: flex-start; position: relative; z-index: 3;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .btn-download:hover {
      transform: scale(1.05) translateY(-2px); background: var(--accent); border-color: transparent;
      box-shadow: 0 8px 24px rgba(var(--accent-rgb),0.5);
    }
    .btn-download:active { transform: scale(0.97); }
    .btn-download.loading .dl-icon::before {
      content: '\f110'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
      animation: spin 0.85s linear infinite; display: inline-block;
    }

    /* ══════════════════════════════════════════════
       SECTION WRAPPER & LABELS
    ══════════════════════════════════════════════ */
    .section-card { padding: 30px 36px; }

    .section-label {
      font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px; position: relative; z-index: 3;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .section-label .label-icon {
      width: 34px; height: 34px; border-radius: 9px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(var(--accent-rgb),0.4); display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 0.85rem; flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       NESTED GLASS CARD ITEMS
    ══════════════════════════════════════════════ */
    .glass-card-item {
      position: relative; isolation: isolate; padding: 18px 20px;
      border-radius: var(--radius-lg); background: rgba(0, 0, 0, 0.25); /* Background gelap */
      border: 1px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.2);
      box-shadow: 0 4px 14px rgba(0,0,0,0.2); transition: all 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    .glass-card-item > * { position: relative; z-index: 3; }
    .glass-card-item:hover {
      background: rgba(0, 0, 0, 0.4); border-top-color: rgba(255,255,255,0.3);
      transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.3);
    }

    /* ══════════════════════════════════════════════
       EDUCATION
    ══════════════════════════════════════════════ */
    .edu-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; position:relative; z-index:3; }
    .edu-degree { font-size:0.75rem; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
    .edu-uni    { font-size:0.9rem; font-weight:700; color:#fff; margin-bottom:6px; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    .edu-prodi  { font-size:0.8rem; color:var(--text-secondary); margin-bottom:6px; }
    .edu-year   { font-size:0.75rem; color:var(--text-muted); }

    /* ══════════════════════════════════════════════
       STATS BAR
    ══════════════════════════════════════════════ */
    .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; position:relative; z-index:3; }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-pill); font-size:0.8rem; font-weight:600; color:var(--text-secondary);
    }
    .stat-pill .stat-num { font-size:1.1rem; font-weight:800; color:#fff; }
    .stat-pill i { color:var(--accent); font-size:0.8rem; }

    /* ══════════════════════════════════════════════
       TABS
    ══════════════════════════════════════════════ */
    .tab-bar {
      display: flex; gap: 6px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-pill);
      padding: 6px; margin-bottom: 24px; position:relative; z-index:3;
    }
    .tab-btn {
      flex: 1; padding: 10px 14px; border: none; border-radius: var(--radius-pill);
      background: transparent; color: var(--text-muted); font-family: var(--font); font-size:0.85rem; font-weight:600;
      cursor: pointer; transition: all 0.28s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .tab-btn.active { background: rgba(255,255,255,0.15); color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .tab-btn:not(.active):hover { color:var(--text-secondary); background:rgba(255,255,255,0.05); }
    .tab-pane { display:none; position:relative; z-index:3; }
    .tab-pane.active { display:block; animation: fadeUp 0.3s ease both; }

    /* ══════════════════════════════════════════════
       TEACHING / COURSES
    ══════════════════════════════════════════════ */
    .campus-block { margin-bottom: 24px; }
    .campus-label {
      font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
      color:var(--text-secondary); margin-bottom:12px; display:flex; align-items:center; gap:8px;
    }
    .campus-label i { color:var(--accent); font-size:0.85rem; }
    .course-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .course-name { font-size:0.9rem; font-weight:600; color:#fff; margin-bottom:6px; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
    .course-sem  { font-size:0.75rem; color:var(--text-muted); }

    /* ══════════════════════════════════════════════
       PUBLICATIONS & PENGABDIAN
    ══════════════════════════════════════════════ */
    .pub-list { display:flex; flex-direction:column; gap:12px; }
    .pub-item { display:flex; align-items:flex-start; gap:16px; }
    .pub-year-badge {
      flex-shrink:0; width:50px; height:50px; border-radius:12px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(var(--accent-rgb),0.4);
      display:flex; align-items:center; justify-content:center;
      font-size:0.75rem; font-weight:800; color:var(--accent);
    }
    .pub-body { flex:1; min-width:0; }
    .pub-title { font-size:0.9rem; font-weight:600; line-height:1.5; color:#fff; margin-bottom:8px; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
    .pub-title a { color:#fff; text-decoration:none; transition:color .2s; }
    .pub-title a:hover { color:var(--accent); }
    .pub-meta { display:flex; flex-wrap:wrap; gap:8px; }
    .tag {
      padding:4px 12px; border-radius:var(--radius-pill); background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.15); font-size:0.7rem; font-weight:600; color:var(--text-secondary);
    }
    .cite-badge { background:rgba(var(--accent-rgb),0.2); color:#fff; border-color:rgba(var(--accent-rgb),0.5); }

    /* ══════════════════════════════════════════════
       LOADER
    ══════════════════════════════════════════════ */
    #page-loader {
      position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#0f172a; gap:14px;
    }
    .loader-ring { width:42px; height:42px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin .85s linear infinite; }
    .loader-text { font-size:0.85rem; font-weight:600; color:var(--text-muted); }
    #page-loader.hidden { opacity:0; pointer-events:none; transition:opacity .5s ease; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .profile-card { flex-direction:column; text-align:center; padding:30px 20px; }
      .profile-chips { justify-content:center; }
      .profile-bio { max-width:100%; }
      .btn-download { align-self:center; }
      .edu-grid, .course-grid { grid-template-columns:1fr; }
      .tab-btn .tab-text { display:none; }
      .section-card { padding:24px 20px; }
    }
  </style>
</head>
<body>

  <svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
    <defs>
      <filter id="liquid-glass-filter" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.010" numOctaves="1" result="warp"/>
        <feDisplacementMap in="SourceGraphic" in2="warp" scale="7" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div id="page-loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Memuat profil liquid glass…</div>
  </div>

  <div class="page-wrap" id="main-content" style="opacity:0;">

    <div class="glass profile-card" id="card-profile">
      <div class="avatar-ring">
        <div class="avatar-inner">
          <img id="cv-photo" src="profile.png" alt="Foto Profil" onerror="this.style.display='none'; document.getElementById('cv-avatar-fallback').style.display='flex';" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
          <i id="cv-avatar-fallback" class="fa-solid fa-user-tie" style="display: none;"></i>
        </div>
      </div>
      <div class="profile-info">
        <div class="profile-name" id="prof-name">—</div>
        <div class="profile-role" id="prof-role">—</div>
        <div class="profile-chips" id="prof-chips"></div>
        <div class="profile-bio">
          Dosen aktif di bidang Bisnis Digital dengan keahlian dalam pengembangan sistem informasi,
          kecerdasan buatan, dan pemrograman web. Berpengalaman mengajar di dua perguruan tinggi dan
          aktif berkontribusi melalui penelitian, pengabdian, serta publikasi ilmiah.
        </div>
      </div>
      <button class="btn-download" id="btn-dl" onclick="downloadPDF()">
        <i class="fa-solid fa-arrow-down-to-line dl-icon"></i>
        <span>Unduh CV</span>
      </button>
    </div>

    <div class="glass section-card">
      <div class="section-label">
        <span class="label-icon"><i class="fa-solid fa-graduation-cap"></i></span> Pendidikan
      </div>
      <div class="edu-grid" id="edu-grid"></div>
    </div>

    <div class="glass section-card">
      <div class="stats-bar" id="stats-bar"></div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('teaching',this)">
          <i class="fa-solid fa-chalkboard-user"></i> <span class="tab-text">Pengajaran</span>
        </button>
        <button class="tab-btn" onclick="switchTab('research',this)">
          <i class="fa-solid fa-book-open"></i> <span class="tab-text">Publikasi</span>
        </button>
        <button class="tab-btn" onclick="switchTab('service',this)">
          <i class="fa-solid fa-handshake-angle"></i> <span class="tab-text">Pengabdian</span>
        </button>
      </div>

      <div class="tab-pane active" id="tab-teaching"><div id="teaching-content"></div></div>
      <div class="tab-pane"        id="tab-research"><div class="pub-list" id="research-content"></div></div>
      <div class="tab-pane"        id="tab-service"> <div class="pub-list" id="service-content"></div></div>
    </div>

  </div>

  <script>
  /* ── Helpers ── */
  const $ = id => document.getElementById(id);

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    $('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  /* ── Load data ── */
  async function loadData() {
    try {
      const res  = await fetch('./data.json?t=' + Date.now());
      const data = await res.json();
      if (data.status !== 'success') throw new Error('Bad status');
      const p = data.profil;

      $('prof-name').textContent = p.nama || '—';
      $('prof-role').textContent = `Dosen – ${p.nama_prodi || ''}`;
      $('prof-chips').innerHTML = [
        { icon:'fa-university', text: p.nama_pt   || '' },
        { icon:'fa-id-badge',   text: 'NIDN ' + (p.nidn || '') },
        { icon:'fa-briefcase',  text: p.nama_prodi || '' },
      ].map(c=>`<span class="chip"><i class="fa-solid ${c.icon}"></i>${c.text}</span>`).join('');

      /* Education */
      const sorted = [...(data.pendidikan||[])].sort((a,b)=>+b.tahun - +a.tahun);
      $('edu-grid').innerHTML = sorted.map(e => {
        const prodi = (e.prodi && e.prodi!=='N/A') ? `<div class="edu-prodi"><i class="fa-solid fa-layer-group" style="font-size:.6rem;margin-right:4px;"></i>${e.prodi}</div>` : '';
        return `<div class="glass-card-item">
          <div class="edu-degree">${e.jenjang}</div>
          <div class="edu-uni">${e.pt}</div>${prodi}
          <div class="edu-year"><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>Lulus ${e.tahun}</div>
        </div>`;
      }).join('');

      /* Teaching */
      const tc = $('teaching-content');
      if (!data.mengajar||!data.mengajar.length) {
        tc.innerHTML='<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        tc.innerHTML = data.mengajar.map(kampus => {
          const courses=(kampus.mata_kuliah||[]).map(mk=>`
            <div class="glass-card-item">
              <div class="course-name">${mk.nama}</div>
              <div class="course-sem"><i class="fa-regular fa-calendar-check" style="margin-right:4px;"></i>${mk.semester}</div>
            </div>`).join('');
          return `<div class="campus-block">
            <div class="campus-label"><i class="fa-solid fa-landmark"></i>${kampus.nama_kampus}</div>
            <div class="course-grid">${courses}</div>
          </div>`;
        }).join('');
      }

      /* Publications + stats */
      const rc = $('research-content');
      if (!data.publikasi||!data.publikasi.length) {
        rc.innerHTML='<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        const totalSitasi    = data.publikasi.reduce((a,pub)=>{const n=parseInt(pub.sitasi||'0',10);return a+(isNaN(n)?0:n);},0);
        const totalPub       = data.publikasi.length;
        const totalMengajar  = (data.mengajar||[]).reduce((a,k)=>a+(k.mata_kuliah||[]).length,0);
        const totalPengabd   = (data.pengabdian||[]).length;

        $('stats-bar').innerHTML=[
          {icon:'fa-book-open',       num:totalPub,       label:'Publikasi'},
          {icon:'fa-star',            num:totalSitasi,    label:'Sitasi'},
          {icon:'fa-chalkboard-user', num:totalMengajar,  label:'Matkul'},
          {icon:'fa-handshake-angle', num:totalPengabd,   label:'Pengabdian'},
        ].map(s=>`<div class="stat-pill"><i class="fa-solid ${s.icon}"></i><span class="stat-num">${s.num}</span><span>${s.label}</span></div>`).join('');

        rc.innerHTML = data.publikasi.map(pub => {
          const titleInner = pub.link ? `<a href="${pub.link}" target="_blank">${pub.judul} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;margin-left:4px;opacity:.5;"></i></a>` : pub.judul;
          const sitasiNum=parseInt(pub.sitasi||'0',10);
          const citeBadge=sitasiNum>0 ? `<span class="tag cite-badge"><i class="fa-solid fa-star" style="margin-right:3px;"></i>${sitasiNum} Sitasi</span>` : '';
          return `<div class="glass-card-item pub-item">
            <div class="pub-year-badge">${pub.tahun}</div>
            <div class="pub-body">
              <div class="pub-title">${titleInner}</div>
              <div class="pub-meta"><span class="tag">${pub.jenis}</span>${citeBadge}</div>
            </div>
          </div>`;
        }).join('');
      }

      /* Pengabdian */
      const sc=$('service-content');
      if (!data.pengabdian||!data.pengabdian.length) {
        sc.innerHTML='<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        sc.innerHTML=data.pengabdian.map(item=>`
          <div class="glass-card-item pub-item">
            <div class="pub-year-badge">${item.tahun}</div>
            <div class="pub-body">
              <div class="pub-title">${item.judul}</div>
              <div class="pub-meta"><span class="tag" style="color:#fbbf24; border-color:rgba(251,191,36,0.4);">${item.kategori}</span></div>
            </div>
          </div>`).join('');
      }

      /* Reveal */
      $('page-loader').classList.add('hidden');
      setTimeout(()=>$('page-loader').remove(), 500);
      const main=$('main-content');
      main.style.transition='opacity .55s ease';
      main.style.opacity='1';

    } catch(err) {
      console.error(err);
      $('page-loader').innerHTML=`<div style="text-align:center;">
        <i class="fa-solid fa-circle-exclamation" style="font-size:2.4rem;color:#ef4444;margin-bottom:12px;"></i>
        <p style="color:#ef4444;font-weight:700;">Gagal memuat data.<br>Pastikan data.json tersedia.</p>
      </div>`;
    }
  }

  /* ── Download PDF (DIROMBAK: MENGGUNAKAN IFRAME AGAR CV.HTML TER-RENDER SEMPURNA) ── */
  async function downloadPDF() {
    const btn = $('btn-dl');
    if(btn.classList.contains('loading')) return;

    btn.classList.add('loading');
    btn.querySelector('span').textContent = 'Memproses CV...';

    try {
      // 1. Buat Iframe tak kasat mata untuk membuka cv.html di balik layar
      const iframe = document.createElement('iframe');
      iframe.style.position = 'fixed';
      iframe.style.right = '-9999px';
      iframe.style.bottom = '-9999px';
      iframe.style.width = '210mm';   // Set ukuran kertas A4
      iframe.style.height = '297mm';
      document.body.appendChild(iframe);

      // 2. Load file cv.html ke dalam Iframe
      iframe.src = './cv.html';

      // 3. Tunggu sampai cv.html selesai menarik data (ditandai dengan display data-container menjadi block)
      await new Promise((resolve, reject) => {
        iframe.onload = () => {
          let attempts = 0;
          const checkData = setInterval(() => {
            attempts++;
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            const dataContainer = iframeDoc.getElementById('data-container');
            
            // Jika data-container sudah muncul, berarti proses fetch data.json sudah selesai!
            if (dataContainer && dataContainer.style.display === 'block') {
              clearInterval(checkData);
              setTimeout(resolve, 500); // Beri jeda 0.5 detik ekstra agar font/icon ikut termuat
            } else if (attempts > 30) { 
              // Timeout setelah 15 detik jika gagal
              clearInterval(checkData);
              reject(new Error('Waktu tunggu habis (Timeout) saat memuat isi CV'));
            }
          }, 500);
        };
        iframe.onerror = reject;
      });

      // 4. Proses render PDF dari konten Iframe yang sudah matang
      const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      
      await html2pdf().set({
        margin:      [0.5, 0.5, 0.5, 0.5],
        filename:    'CV_Vicky_Setia_Gunawan.pdf',
        image:       { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(iframeDoc.body).save();

      // 5. Bersihkan iframe setelah selesai
      document.body.removeChild(iframe);

    } catch(err) {
      console.error(err);
      alert('Gagal memproses dan mengunduh CV. Pastikan file cv.html ada dan koneksi stabil.\n\nDetail: ' + err.message);
    } finally {
      btn.classList.remove('loading');
      btn.querySelector('span').textContent = 'Unduh CV';
    }
  }

  window.addEventListener('DOMContentLoaded', loadData);
  </script>
