<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Akademik Dosen</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        *, *::before, *::after { 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
        }
        
        body { 
            background: radial-gradient(at 0% 0%, #e0f2fe 0px, transparent 50%),
                        radial-gradient(at 100% 0%, #f3e8ff 0px, transparent 50%),
                        radial-gradient(at 100% 100%, #e0e7ff 0px, transparent 50%),
                        radial-gradient(at 0% 100%, #f0fdf4 0px, transparent 50%),
                        #f8fafc;
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            color: #1c1c1e;
            padding-bottom: 3rem;
        }

        .app-header { padding: 3rem 0 4rem 0; text-align: center; }
        .app-header h2 { font-weight: 700; letter-spacing: -0.03em; color: #1d1d1f; font-size: 2.25rem; }

        /* --- APPLE LIQUID GLASS --- */
        .apple-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px) saturate(210%);
            -webkit-backdrop-filter: blur(30px) saturate(210%);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02), inset 0 1px 0px rgba(255, 255, 255, 0.6);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .apple-glass:hover {
            background: rgba(255, 255, 255, 0.55);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), inset 0 1px 0px rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .profile-avatar {
            font-size: 2.2rem;
            color: #0071e3;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            width: 76px; height: 76px;
            display: inline-flex; align-items: center; justify-content: center;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 0.8rem 1.4rem;
            text-align: center;
            min-width: 130px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .stat-number { font-size: 1.65rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
        .stat-label { font-size: 0.7rem; color: #86868b; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-top: 2px; }

        .card-title-apple {
            font-size: 1.2rem; font-weight: 700; color: #1d1d1f;
            display: flex; align-items: center; gap: 0.6rem;
            padding-bottom: 1.1rem; border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        /* --- SCROLLING & DATA LIST --- */
        .scrollable-content { max-height: 540px; overflow-y: auto; padding-right: 6px; }
        .scrollable-content::-webkit-scrollbar { width: 4px; }
        .scrollable-content::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
        
        .data-item { padding: 1.1rem 0.6rem; border-bottom: 1px solid rgba(0, 0, 0, 0.04); transition: all 0.25s ease; }
        .data-item:last-child { border-bottom: none; }
        .data-item:hover { background: rgba(255, 255, 255, 0.4); border-radius: 14px; padding-left: 0.9rem; }

        .title-link {
            color: #1d1d1f;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .title-link:hover { color: #0071e3; }

        /* --- CHIPS & BUTTONS --- */
        .apple-badge {
            font-size: 0.68rem; font-weight: 600; padding: 0.35rem 0.75rem;
            border-radius: 10px; letter-spacing: 0.02em;
        }
        .apple-badge-blue { background: rgba(0, 113, 227, 0.08); color: #0071e3; }
        .apple-badge-gray { background: rgba(0, 0, 0, 0.04); color: #515154; }

        .btn-apple-refresh {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #1d1d1f; font-size: 0.8rem; font-weight: 500;
            padding: 0.5rem 1.2rem; border-radius: 50px;
            backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .btn-apple-refresh:hover { background: #0071e3; color: white; border-color: #0071e3; }
        #loading { display: flex; justify-content: center; align-items: center; height: 60vh; flex-direction: column; }

        @media (max-width: 767.98px) {
            .app-header { padding: 1.5rem 0 2.5rem 0; }
            .app-header h2 { font-size: 1.75rem; }
            .stat-box { min-width: 47%; padding: 0.6rem 1rem; }
            .apple-glass { border-radius: 24px; padding: 1.25rem !important; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <div class="container px-4">
        <h2><i class="bi bi-apple me-2 text-dark opacity-75"></i>Portofolio Akademik</h2>
        <p class="text-muted small fw-medium mb-0 mt-1">Sinkronisasi Real-time Scholar & PDDIKTI</p>
    </div>
</div>

<div class="container px-4">
    <div id="loading">
        <div class="spinner-border text-secondary" role="status" style="width: 2rem; height: 2rem; stroke-width: 3px;"></div>
        <p class="mt-3 text-muted small fw-medium">Memuat antarmuka kaca cair...</p>
    </div>

    <div id="data-container" style="display: none;">
        <!-- Profile Card -->
        <div class="card apple-glass card-profile p-4 mb-4">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-4">
                <div class="d-flex align-items-center gap-3 flex-wrap">
                    <div class="profile-avatar"><i class="bi bi-person-crop-rectangle"></i></div>
                    <div>
                        <h4 id="nama" class="fw-bold mb-1" style="letter-spacing: -0.02em; color:#1d1d1f;">-</h4>
                        <div class="text-muted small fw-medium mb-2"><i class="bi bi-building-fill me-1 opacity-70"></i><span id="pt"></span></div>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="apple-badge apple-badge-blue"><i class="bi bi-bookmark-star-fill me-1"></i> <span id="prodi"></span></span>
                            <span class="apple-badge apple-badge-gray"><i class="bi bi-qr-code me-1"></i> NIDN: <span id="nidn"></span></span>
                        </div>
                    </div>
                </div>
                <!-- Counters -->
                <div class="d-flex gap-2 w-100-mobile justify-content-between">
                    <div class="stat-box">
                        <div id="count-pengabdian" class="stat-number">0</div>
                        <div class="stat-label">Pengabdian & Internal</div>
                    </div>
                    <div class="stat-box">
                        <div id="count-publikasi" class="stat-number">0</div>
                        <div class="stat-label">Jurnal Publikasi</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Kolom Kiri -->
            <div class="col-lg-6">
                <div class="card apple-glass p-4 h-100">
                    <h5 class="card-title-apple" style="color: #10b981;"><i class="bi bi-heart-pulse-fill"></i> Pengabdian & Karya Internal</h5>
                    <div class="scrollable-content mt-2"><div id="list-pengabdian"></div></div>
                </div>
            </div>

            <!-- Kolom Kanan -->
            <div class="col-lg-6">
                <div class="card apple-glass p-4 h-100">
                    <h5 class="card-title-apple" style="color: #0071e3;"><i class="bi bi-journal-text"></i> Jurnal Ilmiah & Publikasi</h5>
                    <div class="scrollable-content mt-2"><div id="list-publikasi"></div></div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <button onclick="fetchData()" class="btn btn-apple-refresh"><i class="bi bi-arrow-synced me-1"></i> Sinkronisasi Layar</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('data-container').style.display = 'none';
        
        try {
            const response = await fetch('./data.json?t=' + new Date().getTime()); 
            const data = await response.json();
            
            if (data.status === 'success') {
                document.getElementById('nama').innerText = data.profil.nama || '-';
                document.getElementById('pt').innerText = data.profil.nama_pt || '-';
                document.getElementById('prodi').innerText = data.profil.nama_prodi || '-';
                document.getElementById('nidn').innerText = data.profil.nidn || '-';
                
                document.getElementById('count-pengabdian').innerText = data.pengabdian ? data.pengabdian.length : 0;
                document.getElementById('count-publikasi').innerText = data.publikasi ? data.publikasi.length : 0;
                
                const renderContainer = (elementId, arrayData, badgeKey, textClass, bgBadge) => {
                    const container = document.getElementById(elementId);
                    container.innerHTML = '';
                    
                    if (!arrayData || arrayData.length === 0) {
                        container.innerHTML = `<div class="text-center text-muted py-5 opacity-60"><i class="bi bi-box-seam fs-3 d-block mb-2"></i><span class="small fw-medium">Belum ada riwayat kegiatan.</span></div>`;
                        return;
                    }
                    
                    arrayData.forEach(item => {
                        // Fitur Ekstraksi Komponen Jurnal & Link Scholar
                        const hasLink = item.link && item.link !== '';
                        const titleWrapper = hasLink ? 
                            `<a href="${item.link}" target="_blank" class="fw-semibold title-link small d-block mb-1" style="line-height:1.4;">
                                ${item.judul} <i class="bi bi-box-arrow-up-right ms-1 opacity-50" style="font-size:0.75rem;"></i>
                            </a>` : 
                            `<div class="fw-semibold text-dark small mb-1" style="line-height:1.4; color:#1d1d1f;">${item.judul}</div>`;

                        const labelTahun = item.tahun && item.tahun !== 'N/A' ? 
                            `<span class="me-3"><i class="bi bi-calendar-event me-1"></i>Tahun: ${item.tahun}</span>` : '';
                        
                        const labelSitasi = item.sitasi && item.sitasi !== '0' ? 
                            `<span style="color:#d97706;"><i class="bi bi-star-fill me-1"></i>Sitasi: ${item.sitasi}</span>` : '';
                        
                        container.innerHTML += `
                            <div class="data-item d-flex justify-content-between align-items-start gap-3">
                                <div class="flex-grow-1">
                                    ${titleWrapper}
                                    <div class="text-muted mt-1 opacity-75 d-flex flex-wrap align-items-center" style="font-size:0.72rem; font-weight:500;">
                                        ${labelTahun}
                                        ${labelSitasi}
                                    </div>
                                </div>
                                <span class="badge ${bgBadge} ${textClass} rounded-pill px-2.5 py-1 small align-self-start text-uppercase" style="font-size:0.62rem; font-weight:700; letter-spacing:0.02em;">
                                    ${item[badgeKey]}
                                </span>
                            </div>`;
                    });
                };

                renderContainer('list-pengabdian', data.pengabdian, 'kategori', 'text-success', 'bg-success bg-opacity-10 border border-success border-opacity-10');
                renderContainer('list-publikasi', data.publikasi, 'jenis', 'text-primary', 'bg-primary bg-opacity-10 border border-primary border-opacity-10');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('data-container').style.display = 'block';
            }
        } catch (error) {
            console.error(error);
        }
    }
    window.onload = fetchData;
</script>
</body>
</html>
