<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Vitae - Akademik</title>
    
    <!-- Google Fonts: Inter untuk teks yang sangat rapi saat dicetak -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background-color: #525659; /* Warna latar belakang khas PDF viewer */
            font-family: 'Inter', Arial, sans-serif; 
            color: #111827;
            padding: 2rem 0;
        }

        /* --- SIMULASI KERTAS A4 --- */
        .cv-paper {
            background: #ffffff;
            width: 100%;
            max-width: 210mm; /* Lebar standar A4 */
            min-height: 297mm; /* Tinggi standar A4 */
            margin: 0 auto;
            padding: 40px 50px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border-radius: 2px;
        }

        /* --- HEADER DOKUMEN --- */
        .header-border {
            border-bottom: 3px solid #000000;
            padding-bottom: 25px;
            margin-bottom: 30px;
        }

        /* Bingkai Foto Rasio Pasfoto (3x4) */
        .photo-box {
            width: 113px;
            height: 151px;
            border: 2px solid #000000;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .photo-box .fa-user-tie { font-size: 4.5rem; color: #9ca3af; }

        /* Tipografi Identitas */
        .cv-name {
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000000;
            margin-bottom: 5px;
            line-height: 1.2;
        }
        .cv-title {
            font-size: 15px;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .cv-contact {
            font-size: 13px;
            color: #111827;
            line-height: 1.6;
        }
        .cv-contact span { margin-right: 15px; }
        .cv-contact i { width: 16px; text-align: center; margin-right: 5px; color: #4b5563; }

        /* --- TOMBOL SINKRONISASI FORMAL --- */
        .btn-sync {
            background: transparent;
            border: 1px solid #000000;
            color: #000000;
            border-radius: 0;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            padding: 6px 14px;
            transition: background 0.2s;
        }
        .btn-sync:hover { background: #000000; color: #ffffff; }

        /* --- JUDUL SEKSI --- */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000000;
            border-bottom: 1.5px solid #000000;
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        /* --- LIST ITEM CV --- */
        .cv-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dotted #cbd5e1;
            page-break-inside: avoid;
        }
        .cv-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        .item-title {
            font-size: 14px;
            font-weight: 600;
            color: #000000;
            line-height: 1.5;
            margin-bottom: 4px;
            text-align: justify;
        }
        .item-title a { color: #000000; text-decoration: none; }
        .item-title a:hover { text-decoration: underline; }

        .item-meta {
            font-size: 13px;
            color: #374151;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Format Kotak Label (Pengganti Badge Warna) */
        .label-formal {
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #4b5563;
            padding: 2px 6px;
            border-radius: 2px;
            color: #111827;
            text-transform: uppercase;
        }

        /* --- LOADING OVERLAY --- */
        #loading { display: flex; justify-content: center; align-items: center; height: 50vh; flex-direction: column; background: #fff;}

        /* RESPONSIF UNTUK CETAK DAN MOBILE */
        @media print {
            body { background: #ffffff; padding: 0; }
            .cv-paper { box-shadow: none; padding: 0; width: 100%; max-width: 100%; margin: 0; }
            .btn-sync { display: none !important; }
        }
        @media (max-width: 767.98px) {
            body { padding: 0; background: #ffffff; }
            .cv-paper { padding: 25px 20px; box-shadow: none; border-radius: 0; min-height: auto; }
            .header-flex { flex-direction: column; text-align: center; }
            .photo-box { margin: 0 auto 20px auto; }
            .cv-contact { justify-content: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
            .cv-contact span { margin-right: 0; }
            .item-title { text-align: left; }
        }
    </style>
</head>
<body>

<div class="cv-paper">
    
    <!-- Indikator Loading -->
    <div id="loading">
        <div class="spinner-border text-dark" role="status" style="width: 1.5rem; height: 1.5rem; border-width: 2px;"></div>
        <p class="mt-3 text-dark small fw-bold text-uppercase">Memuat Dokumen...</p>
    </div>

    <div id="data-container" style="display: none;">
        
        <!-- HEADER KOP CV -->
        <div class="header-border">
            <div class="d-flex header-flex align-items-md-start">
                
                <!-- PASFOTO -->
                <div class="photo-box">
                    <img id="cv-photo" src="foto-profil.jpg" alt="Pasfoto" onerror="switchToAvatarFallback()">
                    <div id="cv-avatar-fallback" class="d-none">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                </div>

                <!-- INFORMASI IDENTITAS -->
                <div class="ms-md-4 flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                        <div>
                            <h1 id="nama" class="cv-name">NAMA LENGKAP</h1>
                            <div id="prodi-title" class="cv-title">PROGRAM STUDI</div>
                        </div>
                        <!-- Tombol ini tidak akan ikut tercetak (Ctrl+P) -->
                        <button onclick="fetchData()" class="btn btn-sync d-print-none">
                            <i class="fa-solid fa-rotate-right me-1"></i> Update
                        </button>
                    </div>

                    <div class="cv-contact mt-2 mt-md-3">
                        <span class="d-block d-md-inline-block"><i class="fa-solid fa-building-columns"></i><strong id="pt">INSTITUSI</strong></span>
                        <span class="d-block d-md-inline-block"><i class="fa-solid fa-id-card"></i>NIDN. <span id="nidn">-</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- KOLOM PUBLIKASI (Kiri) -->
            <div class="col-lg-12 mb-4">
                <h3 class="section-title">A. Karya Ilmiah & Publikasi Jurnal</h3>
                <div id="list-publikasi"></div>
            </div>

            <!-- KOLOM PENGABDIAN (Bawah/Kanan) -->
            <div class="col-lg-12">
                <h3 class="section-title">B. Pengabdian Masyarakat & Penelitian Internal</h3>
                <div id="list-pengabdian"></div>
            </div>
        </div>

    </div>
</div>

<script>
    // Fungsi Error Handling Foto
    function switchToAvatarFallback() {
        document.getElementById('cv-photo').classList.add('d-none');
        document.getElementById('cv-avatar-fallback').classList.remove('d-none');
    }

    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('data-container').style.setProperty('display', 'none', 'important');
        
        try {
            const response = await fetch('./data.json?t=' + new Date().getTime()); 
            const data = await response.json();
            
            if (data.status === 'success') {
                
                // 1. Data Profil
                document.getElementById('nama').innerText = data.profil.nama || '-';
                document.getElementById('pt').innerText = (data.profil.nama_pt || '-').toUpperCase();
                document.getElementById('prodi-title').innerText = "DOSEN " + (data.profil.nama_prodi || '-');
                document.getElementById('nidn').innerText = data.profil.nidn || '-';
                
                // 2. Render Publikasi
                const pubContainer = document.getElementById('list-publikasi');
                pubContainer.innerHTML = '';
                if (!data.publikasi || data.publikasi.length === 0) {
                    pubContainer.innerHTML = '<p class="item-meta">Tidak ada data publikasi.</p>';
                } else {
                    data.publikasi.forEach(item => {
                        const titleTag = (item.link && item.link !== '') ? 
                            `<a href="${item.link}" target="_blank">${item.judul} <i class="fa-solid fa-link ms-1" style="font-size:10px;"></i></a>` : 
                            `${item.judul}`;
                            
                        const sitasi = (item.sitasi && item.sitasi !== '0') ? `<span>&bull;</span><span>Sitasi: <strong>${item.sitasi}</strong></span>` : '';

                        pubContainer.innerHTML += `
                            <div class="cv-item">
                                <div class="item-title">${titleTag}</div>
                                <div class="item-meta mt-1">
                                    <span class="label-formal">${item.jenis}</span>
                                    <span>Tahun: <strong>${item.tahun}</strong></span>
                                    ${sitasi}
                                </div>
                            </div>`;
                    });
                }

                // 3. Render Pengabdian
                const svcContainer = document.getElementById('list-pengabdian');
                svcContainer.innerHTML = '';
                if (!data.pengabdian || data.pengabdian.length === 0) {
                    svcContainer.innerHTML = '<p class="item-meta">Tidak ada data kegiatan.</p>';
                } else {
                    data.pengabdian.forEach(item => {
                        svcContainer.innerHTML += `
                            <div class="cv-item">
                                <div class="item-title">${item.judul}</div>
                                <div class="item-meta mt-1">
                                    <span class="label-formal">${item.kategori}</span>
                                    <span>Tahun: <strong>${item.tahun}</strong></span>
                                </div>
                            </div>`;
                    });
                }
                
                document.getElementById('loading').style.setProperty('display', 'none', 'important');
                document.getElementById('data-container').style.display = 'block';
            }
        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerHTML = '<p class="text-danger fw-bold">Gagal memuat dokumen. Harap pastikan data.json tersedia.</p>';
        }
    }
    window.onload = fetchData;
</script>
</body>
</html>
