<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vicky Setia Gunawan — Academic Profile</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* ─── RESET & BASE ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sf-display: 'SF Pro Display', 'Plus Jakarta Sans', system-ui, sans-serif;
      --sf-text:    'SF Pro Text',    'Plus Jakarta Sans', system-ui, sans-serif;

      --bg-from:  #c8d8f0;
      --bg-mid:   #dde9f8;
      --bg-to:    #ede8f7;

      --glass-bg:       rgba(255,255,255,0.30);
      --glass-bg-hover: rgba(255,255,255,0.45);
      --glass-border:   rgba(255,255,255,0.45);
      --glass-shadow:   0 8px 32px rgba(100,120,200,0.10), 0 1.5px 6px rgba(100,120,200,0.07);
      --glass-shadow-h: 0 16px 48px rgba(100,120,200,0.16), 0 4px 12px rgba(100,120,200,0.10);

      --blue-accent:    #3a7bd5;
      --indigo-accent:  #6c63ff;
      --text-primary:   #0f1c3f;
      --text-secondary: #4a5880;
      --text-muted:     #8a96b8;

      --radius-xl:  2rem;
      --radius-lg:  1.25rem;
      --radius-md:  0.875rem;
      --radius-pill: 999px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sf-text);
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 10% 5%,  rgba(150,180,255,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 90%, rgba(190,155,255,0.25) 0%, transparent 60%),
        linear-gradient(145deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      padding: 0 0 80px;
      overflow-x: hidden;
    }

    /* ─── ANIMATED BLOBS ─────────────────────────────────────────────── */
    .blob-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35;
      animation: blobFloat 18s ease-in-out infinite;
    }
    .blob-1 { width: 600px; height: 600px; background: #a8c8ff; top: -200px; left: -150px; animation-delay: 0s; }
    .blob-2 { width: 500px; height: 500px; background: #c8b4fa; bottom: -150px; right: -100px; animation-delay: -7s; }
    .blob-3 { width: 350px; height: 350px; background: #b4d4ff; top: 40%; left: 50%; animation-delay: -13s; }

    @keyframes blobFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-40px) scale(1.04); }
      66%      { transform: translate(-20px, 30px) scale(0.97); }
    }

    /* ─── LAYOUT WRAPPER ─────────────────────────────────────────────── */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ─── GLASS CARD ─────────────────────────────────────────────────── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--glass-shadow);
      transition: transform 0.32s cubic-bezier(.22,.68,0,1.2),
                  box-shadow 0.28s ease,
                  background 0.28s ease;
    }
    .glass:hover {
      transform: translateY(-4px);
      box-shadow: var(--glass-shadow-h);
      background: var(--glass-bg-hover);
    }

    /* ─── HERO / PROFILE CARD ────────────────────────────────────────── */
    .profile-card {
      padding: 36px 40px;
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .avatar-ring {
      flex-shrink: 0;
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-accent), var(--indigo-accent));
      padding: 3px;
      box-shadow: 0 0 0 6px rgba(106,99,255,0.12);
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      color: #fff;
      backdrop-filter: blur(6px);
    }

    .profile-info { flex: 1; min-width: 0; }

    .profile-name {
      font-family: var(--sf-display);
      font-size: clamp(1.45rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .profile-role {
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue-accent), var(--indigo-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .profile-chips {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px;
      background: rgba(255,255,255,0.40);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: var(--radius-pill);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
    }
    .chip i { color: var(--blue-accent); font-size: 0.72rem; }

    .profile-bio {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text-secondary);
      max-width: 540px;
    }

    /* ─── DOWNLOAD BUTTON ────────────────────────────────────────────── */
    .btn-download {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 12px 26px;
      background: rgba(255,255,255,0.30);
      border: 1.5px solid rgba(255,255,255,0.55);
      border-radius: var(--radius-pill);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      box-shadow: 0 4px 20px rgba(60,100,220,0.10);
      font-family: var(--sf-text);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--blue-accent);
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(.22,.68,0,1.3),
                  box-shadow 0.22s ease,
                  background 0.22s ease;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .btn-download:hover {
      transform: scale(1.06);
      background: rgba(255,255,255,0.50);
      box-shadow: 0 8px 30px rgba(60,100,220,0.18);
    }
    .btn-download:active { transform: scale(0.97); }
    .btn-download .dl-icon { font-size: 0.95rem; }

    .btn-download.loading .dl-icon::before {
      content: '\f110';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      animation: spin 0.9s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SECTION LABEL ──────────────────────────────────────────────── */
    .section-label {
      font-family: var(--sf-display);
      font-size: 1.18rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label .label-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--blue-accent), var(--indigo-accent));
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 0.82rem;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(106,99,255,0.25);
    }

    /* ─── EDUCATION ──────────────────────────────────────────────────── */
    .edu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .edu-card {
      padding: 20px 22px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(14px);
      transition: transform 0.28s cubic-bezier(.22,.68,0,1.2), box-shadow 0.28s ease;
    }
    .edu-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(100,120,200,0.12);
    }
    .edu-degree {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue-accent), var(--indigo-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .edu-uni {
      font-size: 0.88rem; font-weight: 700; line-height: 1.35;
      color: var(--text-primary); margin-bottom: 8px;
    }
    .edu-year {
      font-size: 0.78rem; font-weight: 600;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    .edu-year i { font-size: 0.7rem; }

    /* ─── TABS ───────────────────────────────────────────────────────── */
    .tab-bar {
      display: flex; gap: 6px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.40);
      border-radius: var(--radius-pill);
      padding: 5px;
      margin-bottom: 20px;
      backdrop-filter: blur(14px);
    }
    .tab-btn {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      font-family: var(--sf-text);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.22s ease;
      white-space: nowrap;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tab-btn i { font-size: 0.78rem; }
    .tab-btn.active {
      background: rgba(255,255,255,0.65);
      color: var(--blue-accent);
      box-shadow: 0 2px 12px rgba(60,100,220,0.12);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── TEACHING ───────────────────────────────────────────────────── */
    .campus-block { margin-bottom: 22px; }
    .campus-label {
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 7px;
    }
    .campus-label i { color: var(--blue-accent); }
    .course-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .course-card {
      padding: 14px 16px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: var(--radius-md);
      backdrop-filter: blur(10px);
      transition: transform 0.22s cubic-bezier(.22,.68,0,1.2), box-shadow 0.22s ease;
    }
    .course-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(100,120,200,0.10);
    }
    .course-name {
      font-size: 0.84rem; font-weight: 700;
      color: var(--text-primary); margin-bottom: 5px; line-height: 1.3;
    }
    .course-sem {
      font-size: 0.73rem; font-weight: 500;
      color: var(--text-muted); display: flex; align-items: center; gap: 5px;
    }
    .course-sem i { font-size: 0.65rem; color: var(--blue-accent); }

    /* ─── PUBLICATION / PENGABDIAN LIST ──────────────────────────────── */
    .pub-list { display: flex; flex-direction: column; gap: 10px; }
    .pub-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: var(--radius-md);
      backdrop-filter: blur(10px);
      transition: transform 0.22s cubic-bezier(.22,.68,0,1.2), box-shadow 0.22s ease;
    }
    .pub-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(100,120,200,0.10);
    }
    .pub-year-badge {
      flex-shrink: 0;
      width: 46px; height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--blue-accent), var(--indigo-accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800; color: #fff;
      letter-spacing: 0.02em;
      box-shadow: 0 2px 10px rgba(106,99,255,0.22);
    }
    .pub-body { flex: 1; min-width: 0; }
    .pub-title {
      font-size: 0.86rem; font-weight: 700; line-height: 1.4;
      color: var(--text-primary); margin-bottom: 5px;
    }
    .pub-title a {
      color: var(--text-primary); text-decoration: none;
      transition: color 0.2s;
    }
    .pub-title a:hover { color: var(--blue-accent); }
    .pub-title a i { font-size: 0.72rem; color: var(--text-muted); margin-left: 4px; }
    .pub-meta { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      background: rgba(58,123,213,0.10);
      border: 1px solid rgba(58,123,213,0.18);
      font-size: 0.72rem; font-weight: 700;
      color: var(--blue-accent);
    }
    .tag.green  { background: rgba(52,199,89,0.09);  border-color: rgba(52,199,89,0.22);  color: #1a8a3c; }
    .tag.purple { background: rgba(108,99,255,0.09); border-color: rgba(108,99,255,0.22); color: var(--indigo-accent); }
    .tag.orange { background: rgba(255,149,0,0.09);  border-color: rgba(255,149,0,0.22);  color: #b06000; }

    /* ─── SPINNER ────────────────────────────────────────────────────── */
    #page-loader {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #c8d8f0, #ede8f7);
      gap: 14px;
    }
    .loader-ring {
      width: 42px; height: 42px;
      border: 3.5px solid rgba(58,123,213,0.15);
      border-top-color: var(--blue-accent);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    #page-loader p { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
    #page-loader.hidden { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }

    /* ─── RESPONSIVE ─────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .profile-card { flex-direction: column; text-align: center; padding: 28px 22px; }
      .profile-chips { justify-content: center; }
      .profile-bio { max-width: 100%; }
      .btn-download { align-self: center; }
      .edu-grid { grid-template-columns: 1fr; }
      .course-grid { grid-template-columns: 1fr; }
      .tab-btn span.tab-text { display: none; }
    }
  </style>
</head>
<body>

<!-- Blobs -->
<div class="blob-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Page Loader -->
<div id="page-loader">
  <div class="loader-ring"></div>
  <p>Memuat profil…</p>
</div>

<!-- Main Content -->
<div class="page-wrap" id="main-content" style="opacity:0;">

  <!-- ── PROFILE CARD ── -->
  <div class="glass profile-card" id="card-profile">
    <div class="avatar-ring">
      <div class="avatar-inner">
        <i class="fa-solid fa-user-tie"></i>
      </div>
    </div>

    <div class="profile-info">
      <div class="profile-name" id="prof-name">—</div>
      <div class="profile-role" id="prof-role">—</div>
      <div class="profile-chips" id="prof-chips"></div>
      <div class="profile-bio">
        Dosen aktif di bidang Bisnis Digital dengan keahlian dalam pengembangan sistem informasi,
        kecerdasan buatan, dan pemrograman web. Berpengalaman mengajar di dua perguruan tinggi dan
        aktif berkontribusi melalui penelitian, pengabdian, serta publikasi ilmiah.
      </div>
    </div>

    <button class="btn-download" id="btn-dl" onclick="downloadPDF()">
      <i class="fa-solid fa-arrow-down-to-line dl-icon"></i>
      <span>Unduh CV</span>
    </button>
  </div>

  <!-- ── EDUCATION ── -->
  <div class="glass" style="padding: 30px 36px;">
    <div class="section-label">
      <span class="label-icon"><i class="fa-solid fa-graduation-cap"></i></span>
      Pendidikan
    </div>
    <div class="edu-grid" id="edu-grid"></div>
  </div>

  <!-- ── TABS: Teaching / Research / Service ── -->
  <div class="glass" style="padding: 30px 36px;">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('teaching', this)">
        <i class="fa-solid fa-chalkboard-user"></i>
        <span class="tab-text">Pengajaran</span>
      </button>
      <button class="tab-btn" onclick="switchTab('research', this)">
        <i class="fa-solid fa-book-open"></i>
        <span class="tab-text">Publikasi</span>
      </button>
      <button class="tab-btn" onclick="switchTab('service', this)">
        <i class="fa-solid fa-handshake-angle"></i>
        <span class="tab-text">Pengabdian</span>
      </button>
    </div>

    <!-- Teaching -->
    <div class="tab-pane active" id="tab-teaching">
      <div id="teaching-content"></div>
    </div>

    <!-- Research / Publications -->
    <div class="tab-pane" id="tab-research">
      <div class="pub-list" id="research-content"></div>
    </div>

    <!-- Service / Pengabdian -->
    <div class="tab-pane" id="tab-service">
      <div class="pub-list" id="service-content"></div>
    </div>
  </div>

</div><!-- /page-wrap -->

<script>
/* ────────────────────────────────────────────────────────────────────
   HELPERS
──────────────────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);

function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function tagClass(jenis) {
  if (!jenis) return '';
  const j = jenis.toLowerCase();
  if (j.includes('nasional terakreditasi') || j.includes('internasional')) return 'green';
  if (j.includes('buku') || j.includes('prosiding')) return 'purple';
  return '';
}

/* ────────────────────────────────────────────────────────────────────
   LOAD DATA
──────────────────────────────────────────────────────────────────── */
async function loadData() {
  try {
    const res  = await fetch('./data.json?t=' + Date.now());
    const data = await res.json();
    if (data.status !== 'success') throw new Error('Bad status');

    const p = data.profil;

    /* Profile */
    $('prof-name').textContent = p.nama || '—';
    $('prof-role').textContent = `Dosen – ${p.nama_prodi || ''}`;

    $('prof-chips').innerHTML = [
      { icon: 'fa-university',  text: p.nama_pt || '' },
      { icon: 'fa-id-badge',    text: 'NIDN ' + (p.nidn || '') },
      { icon: 'fa-briefcase',   text: p.nama_prodi || '' },
    ].map(c => `<span class="chip"><i class="fa-solid ${c.icon}"></i>${c.text}</span>`).join('');

    /* Education */
    const sorted = [...(data.pendidikan || [])].sort((a, b) => +b.tahun - +a.tahun);
    $('edu-grid').innerHTML = sorted.map(e => `
      <div class="edu-card">
        <div class="edu-degree">${e.jenjang}</div>
        <div class="edu-uni">${e.pt}</div>
        <div class="edu-year"><i class="fa-regular fa-calendar"></i> Lulus ${e.tahun}</div>
      </div>`).join('');

    /* Teaching */
    const tc = $('teaching-content');
    if (!data.mengajar || !data.mengajar.length) {
      tc.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
    } else {
      tc.innerHTML = data.mengajar.map(kampus => {
        const courses = (kampus.mata_kuliah || []).map(mk => `
          <div class="course-card">
            <div class="course-name">${mk.nama}</div>
            <div class="course-sem"><i class="fa-regular fa-calendar-check"></i>${mk.semester}</div>
          </div>`).join('');
        return `
          <div class="campus-block">
            <div class="campus-label"><i class="fa-solid fa-landmark"></i>${kampus.nama_kampus}</div>
            <div class="course-grid">${courses}</div>
          </div>`;
      }).join('');
    }

    /* Publications */
    const rc = $('research-content');
    if (!data.publikasi || !data.publikasi.length) {
      rc.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
    } else {
      rc.innerHTML = data.publikasi.map(pub => {
        const titleInner = pub.link
          ? `<a href="${pub.link}" target="_blank">${pub.judul} <i class="fa-solid fa-arrow-up-right-from-square"></i></a>`
          : pub.judul;
        const tc = tagClass(pub.jenis);
        return `
          <div class="pub-item">
            <div class="pub-year-badge">${pub.tahun}</div>
            <div class="pub-body">
              <div class="pub-title">${titleInner}</div>
              <div class="pub-meta">
                <span class="tag ${tc}">${pub.jenis}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    /* Pengabdian */
    const sc = $('service-content');
    if (!data.pengabdian || !data.pengabdian.length) {
      sc.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
    } else {
      sc.innerHTML = data.pengabdian.map(item => `
        <div class="pub-item">
          <div class="pub-year-badge">${item.tahun}</div>
          <div class="pub-body">
            <div class="pub-title">${item.judul}</div>
            <div class="pub-meta">
              <span class="tag orange">${item.kategori}</span>
            </div>
          </div>
        </div>`).join('');
    }

    /* Reveal */
    const loader = $('page-loader');
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);

    const main = $('main-content');
    main.style.transition = 'opacity 0.5s ease';
    main.style.opacity = '1';

  } catch (err) {
    console.error(err);
    $('page-loader').innerHTML = `
      <div style="text-align:center;">
        <i class="fa-solid fa-circle-exclamation" style="font-size:2.4rem;color:#ef4444;margin-bottom:10px;"></i>
        <p style="color:#ef4444;font-weight:700;">Gagal memuat data.<br>Pastikan data.json tersedia.</p>
      </div>`;
  }
}

/* ────────────────────────────────────────────────────────────────────
   DOWNLOAD PDF
──────────────────────────────────────────────────────────────────── */
async function downloadPDF() {
  const btn = $('btn-dl');
  if (btn.classList.contains('loading')) return;

  btn.classList.add('loading');
  btn.querySelector('span').textContent = 'Menyiapkan…';

  try {
    const res = await fetch('./cv.html');
    if (!res.ok) throw new Error('Fetch cv.html failed: ' + res.status);
    const html = await res.text();

    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;left:-9999px;top:0;width:210mm;';
    container.innerHTML = html;
    document.body.appendChild(container);

    /* Wait for fonts / images inside the cloned doc */
    await new Promise(r => setTimeout(r, 600));

    await html2pdf().set({
      margin:      [0.5, 0.5, 0.5, 0.5],
      filename:    'CV_Vicky_Setia_Gunawan.pdf',
      image:       { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak:   { mode: ['avoid-all', 'css'] },
    }).from(container).save();

    document.body.removeChild(container);
  } catch (err) {
    console.error(err);
    alert('Gagal mengunduh CV.\nPastikan file cv.html berada di folder yang sama.\n\nDetail: ' + err.message);
  } finally {
    btn.classList.remove('loading');
    btn.querySelector('span').textContent = 'Unduh CV';
  }
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
