<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Vicky Setia Gunawan — Liquid Glass Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* ══════════════════════════════════════════════
       ROOT — Liquid Glass variables (Archis Vaze)
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;

      /* Core liquid-glass vars from Archis Vaze index.css */
      --tint-color:       255, 255, 255;
      --tint-opacity:     0.09;
      --shadow-blur:      22px;
      --shadow-spread:    -5px;
      --shadow-color:     rgba(255, 255, 255, 0.50);
      --outer-shadow-blur: 28px;
      --glass-radius:     28px;
      --accent:           #8b7cf7;
      --accent-rgb:       139, 124, 247;

      --text-primary:   #ffffff;
      --text-secondary: rgba(255,255,255,0.75);
      --text-muted:     rgba(255,255,255,0.45);
      --radius-pill:    999px;
      --radius-lg:      18px;
      --radius-md:      12px;
    }

    html { scroll-behavior: smooth; }

    /* ══════════════════════════════════════════════
       BODY + BACKGROUND
    ══════════════════════════════════════════════ */
    body {
      font-family: var(--font);
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: 80px;
      /* Same BG as Archis Vaze source */
      background:
        url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop')
        center/cover no-repeat fixed;
    }

    /* ══════════════════════════════════════════════
       LIQUID GLASS ENGINE
       Technique: 3 layers from Archis Vaze CSS version
         1. Card itself  → backdrop-filter blur/saturate + tint bg
         2. ::before     → inset glow (the "3D depth" secret)
         3. ::after      → specular gradient sheen
       Plus SVG filter #liquid-glass-filter on backdrop (Chrome/Edge)
    ══════════════════════════════════════════════ */
    .glass {
      position: relative;
      isolation: isolate;
      border-radius: var(--glass-radius);

      /* ── Layer 1: Frosted glass core ── */
      background-color: rgba(var(--tint-color), var(--tint-opacity));
      backdrop-filter: blur(48px) saturate(1.7) brightness(1.06);
      -webkit-backdrop-filter: blur(48px) saturate(1.7) brightness(1.06);

      /* ── Outer drop-shadow + specular border ── */
      box-shadow:
        0 8px var(--outer-shadow-blur) rgba(0,0,0,0.28),
        0 2px 4px rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      border-top-color:  rgba(255,255,255,0.32);
      border-left-color: rgba(255,255,255,0.20);
      border-bottom-color: rgba(0,0,0,0.06);
      border-right-color:  rgba(0,0,0,0.04);

      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1),
                  box-shadow 0.38s ease;
    }

    /* ── Layer 2: Inner glow — the "3D liquid" depth effect from Archis Vaze ── */
    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: inherit;
      /* This inset shadow creates the concave-lens inner lighting */
      box-shadow: inset 0 0 var(--shadow-blur) var(--shadow-spread) var(--shadow-color);
      pointer-events: none;
    }

    /* ── Layer 3: Specular sheen — diagonal light sweep ── */
    .glass::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      border-radius: inherit;
      background: linear-gradient(
        145deg,
        rgba(255,255,255,0.14) 0%,
        rgba(255,255,255,0.05) 25%,
        transparent 55%,
        rgba(0,0,0,0.03) 100%
      );
      /* Progressive enhancement: SVG lens distortion on backdrop (Chrome/Edge) */
      backdrop-filter: url(#liquid-glass-filter);
      -webkit-backdrop-filter: url(#liquid-glass-filter);
      pointer-events: none;
    }

    .glass:hover {
      transform: translateY(-3px);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.36),
        0 4px 8px rgba(0,0,0,0.18);
    }

    /* ══════════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════════ */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Staggered entrance */
    .page-wrap > * {
      animation: fadeUp 0.65s cubic-bezier(0.32,0.72,0,1) both;
    }
    .page-wrap > *:nth-child(1) { animation-delay: 0.05s; }
    .page-wrap > *:nth-child(2) { animation-delay: 0.14s; }
    .page-wrap > *:nth-child(3) { animation-delay: 0.22s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ══════════════════════════════════════════════
       PROFILE CARD
    ══════════════════════════════════════════════ */
    .profile-card {
      padding: 36px 40px;
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .avatar-ring {
      flex-shrink: 0;
      width: 100px; height: 100px;
      border-radius: 50%;
      /* Conic rainbow ring — premium feel */
      background: conic-gradient(from 0deg,
        #8b7cf7, #4f8ef7, #c084fc, #f472b6, #8b7cf7);
      padding: 3px;
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.07),
        0 8px 24px rgba(139,124,247,0.40);
      position: relative; z-index: 3;
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      /* Mini liquid glass on avatar */
      background: rgba(20,18,30,0.55);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.14);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.88);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.20);
    }

    .profile-info { flex: 1; min-width: 0; position: relative; z-index: 3; }

    .profile-name {
      font-size: clamp(1.55rem, 3vw, 2.15rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #fff;
      line-height: 1.08;
      margin-bottom: 6px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.25);
    }
    .profile-role {
      font-size: 0.76rem; font-weight: 700;
      letter-spacing: 0.11em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px; opacity: 0.95;
    }
    .profile-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px;
      /* Each chip is also a mini glass element */
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-top-color: rgba(255,255,255,0.22);
      border-radius: var(--radius-pill);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      font-size: 0.75rem; font-weight: 600;
      color: var(--text-secondary);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    }
    .chip i { color: var(--accent); font-size: 0.68rem; }
    .profile-bio {
      font-size: 0.875rem; line-height: 1.65;
      color: var(--text-secondary); max-width: 560px;
    }

    /* ── Download button ── */
    .btn-download {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 11px 24px;
      background: rgba(var(--accent-rgb), 0.16);
      border: 1px solid rgba(var(--accent-rgb), 0.32);
      border-top-color: rgba(var(--accent-rgb), 0.50);
      border-radius: var(--radius-pill);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      font-family: var(--font);
      font-size: 0.84rem; font-weight: 700; color: #fff;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      transition: all 0.25s cubic-bezier(0.32,0.72,0,1);
      flex-shrink: 0; align-self: flex-start;
      position: relative; z-index: 3;
    }
    .btn-download:hover {
      transform: scale(1.06) translateY(-1px);
      background: var(--accent);
      border-color: transparent;
      box-shadow: 0 8px 24px rgba(var(--accent-rgb),0.45), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .btn-download:active { transform: scale(0.97); }
    .btn-download.loading .dl-icon::before {
      content: '\f110'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
      animation: spin 0.85s linear infinite; display: inline-block;
    }

    /* ══════════════════════════════════════════════
       SECTION WRAPPER
    ══════════════════════════════════════════════ */
    .section-card { padding: 28px 34px; }

    .section-label {
      font-size: 1.05rem; font-weight: 700; color: #fff;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
      position: relative; z-index: 3;
    }
    .section-label .label-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: rgba(var(--accent-rgb),0.15);
      border: 1px solid rgba(var(--accent-rgb),0.28);
      border-top-color: rgba(var(--accent-rgb),0.40);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 0.84rem; flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    }

    /* ══════════════════════════════════════════════
       NESTED GLASS CARD ITEMS
       — Same 3-layer liquid-glass technique, scaled down
    ══════════════════════════════════════════════ */
    .glass-card-item {
      position: relative; isolation: isolate;
      padding: 18px 20px;
      border-radius: var(--radius-lg);
      background: rgba(var(--tint-color), 0.055);
      backdrop-filter: blur(24px) saturate(1.5) brightness(1.04);
      -webkit-backdrop-filter: blur(24px) saturate(1.5) brightness(1.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-top-color: rgba(255,255,255,0.22);
      border-left-color: rgba(255,255,255,0.14);
      box-shadow:
        0 4px 14px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.10);
      transition: all 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    /* Mini inner glow on nested cards */
    .glass-card-item::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 14px -4px rgba(255,255,255,0.35);
      pointer-events: none; z-index: 1;
    }
    /* Mini specular sheen */
    .glass-card-item::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(140deg,
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.03) 30%,
        transparent 60%);
      pointer-events: none; z-index: 2;
    }
    .glass-card-item > * { position: relative; z-index: 3; }
    .glass-card-item:hover {
      background: rgba(255,255,255,0.10);
      border-top-color: rgba(255,255,255,0.32);
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.14);
    }

    /* ══════════════════════════════════════════════
       EDUCATION
    ══════════════════════════════════════════════ */
    .edu-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; position:relative;z-index:3; }
    .edu-degree { font-size:0.7rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);margin-bottom:6px; }
    .edu-uni    { font-size:0.87rem;font-weight:700;color:#fff;margin-bottom:5px; }
    .edu-prodi  { font-size:0.77rem;color:var(--text-secondary);margin-bottom:5px; }
    .edu-year   { font-size:0.72rem;color:var(--text-muted); }

    /* ══════════════════════════════════════════════
       STATS BAR
    ══════════════════════════════════════════════ */
    .stats-bar {
      display: flex; gap: 9px; flex-wrap: wrap;
      margin-bottom: 20px; position:relative;z-index:3;
    }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 16px;
      /* Glass pill */
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-top-color: rgba(255,255,255,0.20);
      border-radius: var(--radius-pill);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.09);
      font-size:0.78rem;font-weight:600;color:var(--text-secondary);
    }
    .stat-pill .stat-num { font-size:1.05rem;font-weight:800;color:#fff; }
    .stat-pill i { color:var(--accent);font-size:0.75rem; }

    /* ══════════════════════════════════════════════
       TABS
    ══════════════════════════════════════════════ */
    .tab-bar {
      display: flex; gap: 5px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      border-top-color: rgba(255,255,255,0.18);
      border-radius: var(--radius-pill);
      padding: 5px;
      margin-bottom: 20px;
      position:relative;z-index:3;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .tab-btn {
      flex: 1; padding: 10px 12px;
      border: none; border-radius: var(--radius-pill);
      background: transparent; color: var(--text-muted);
      font-family: var(--font); font-size:0.82rem;font-weight:600;
      cursor: pointer; transition: all 0.28s cubic-bezier(0.32,0.72,0,1);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .tab-btn.active {
      /* Active tab = glass pill */
      background: rgba(255,255,255,0.13);
      color: #fff;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.22),
        0 2px 8px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.10);
      border-top-color: rgba(255,255,255,0.24);
    }
    .tab-btn:not(.active):hover { color:var(--text-secondary); background:rgba(255,255,255,0.05); }
    .tab-pane { display:none; position:relative;z-index:3; }
    .tab-pane.active { display:block; animation: fadeUp 0.3s cubic-bezier(0.32,0.72,0,1) both; }

    /* ══════════════════════════════════════════════
       TEACHING / COURSES
    ══════════════════════════════════════════════ */
    .campus-block { margin-bottom: 20px; }
    .campus-label {
      font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;
      color:var(--text-muted);margin-bottom:11px;
      display:flex;align-items:center;gap:7px;
    }
    .campus-label i { color:var(--accent);font-size:0.76rem; }
    .course-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:10px; }
    .course-name { font-size:0.85rem;font-weight:600;color:#fff;margin-bottom:5px; }
    .course-sem  { font-size:0.72rem;color:var(--text-muted); }

    /* ══════════════════════════════════════════════
       PUBLICATIONS & PENGABDIAN
    ══════════════════════════════════════════════ */
    .pub-list { display:flex;flex-direction:column;gap:10px; }
    .pub-item { display:flex;align-items:flex-start;gap:14px; }
    .pub-year-badge {
      flex-shrink:0;width:46px;height:46px;border-radius:11px;
      background:rgba(var(--accent-rgb),0.12);
      border:1px solid rgba(var(--accent-rgb),0.22);
      border-top-color:rgba(var(--accent-rgb),0.36);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      display:flex;align-items:center;justify-content:center;
      font-size:0.7rem;font-weight:800;color:var(--accent);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .pub-body { flex:1;min-width:0; }
    .pub-title { font-size:0.87rem;font-weight:600;line-height:1.45;color:#fff;margin-bottom:8px; }
    .pub-title a { color:#fff;text-decoration:none;transition:color .2s; }
    .pub-title a:hover { color:var(--accent); }
    .pub-meta { display:flex;flex-wrap:wrap;gap:6px; }
    .tag {
      padding:3px 10px;border-radius:var(--radius-pill);
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.11);
      font-size:0.67rem;font-weight:700;letter-spacing:.04em;
      color:var(--text-muted);text-transform:uppercase;
    }
    .cite-badge { background:rgba(var(--accent-rgb),.16);color:#d8b4fe;border-color:rgba(var(--accent-rgb),.30); }

    /* ══════════════════════════════════════════════
       LOADER
    ══════════════════════════════════════════════ */
    #page-loader {
      position:fixed;inset:0;z-index:200;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#06060f;gap:14px;
    }
    .loader-ring {
      width:42px;height:42px;
      border:3px solid rgba(255,255,255,0.08);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .85s linear infinite;
    }
    .loader-text { font-size:0.8rem;font-weight:600;color:var(--text-muted);letter-spacing:.06em; }
    #page-loader.hidden { opacity:0;pointer-events:none;transition:opacity .5s ease; }

    /* ══════════════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════════════ */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════ */
    @media (max-width: 640px) {
      .profile-card { flex-direction:column;text-align:center;padding:26px 20px; }
      .profile-chips { justify-content:center; }
      .profile-bio { max-width:100%; }
      .btn-download { align-self:center; }
      .edu-grid, .course-grid { grid-template-columns:1fr; }
      .tab-btn .tab-text { display:none; }
      .section-card { padding:22px 18px; }
    }
    @media (max-width: 400px) {
      .stat-pill { padding:7px 11px; }
    }
  </style>
</head>
<body>

  <!--
    ════════════════════════════════════════════════
    SVG LIQUID GLASS FILTER — Archis Vaze technique
    ID: #liquid-glass-filter
    Applied via backdrop-filter: url(#liquid-glass-filter)
    on .glass::after for subtle edge-lens distortion
    (Chrome/Edge progressive enhancement)
    ════════════════════════════════════════════════
  -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
    <defs>
      <filter id="liquid-glass-filter"
              x="-5%" y="-5%" width="110%" height="110%"
              color-interpolation-filters="sRGB">
        <!--
          Very-low-frequency fractal noise = almost smooth,
          large-scale warp — simulates the refraction through
          a curved glass surface at the card rim.
        -->
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.010 0.010"
          numOctaves="1"
          seed="4"
          result="warp"/>
        <feDisplacementMap
          in="SourceGraphic"
          in2="warp"
          scale="7"
          xChannelSelector="R"
          yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- LOADER -->
  <div id="page-loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Memuat profil liquid glass…</div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="page-wrap" id="main-content" style="opacity:0;">

    <!-- ── PROFILE CARD ── -->
    <div class="glass profile-card" id="card-profile">
      <div class="avatar-ring">
        <div class="avatar-inner">
          <i class="fa-solid fa-user-tie"></i>
        </div>
      </div>
      <div class="profile-info">
        <div class="profile-name" id="prof-name">—</div>
        <div class="profile-role" id="prof-role">—</div>
        <div class="profile-chips" id="prof-chips"></div>
        <div class="profile-bio">
          Dosen aktif di bidang Bisnis Digital dengan keahlian dalam pengembangan sistem informasi,
          kecerdasan buatan, dan pemrograman web. Berpengalaman mengajar di dua perguruan tinggi dan
          aktif berkontribusi melalui penelitian, pengabdian, serta publikasi ilmiah.
        </div>
      </div>
      <button class="btn-download" id="btn-dl" onclick="downloadPDF()">
        <i class="fa-solid fa-arrow-down-to-line dl-icon"></i>
        <span>Unduh CV</span>
      </button>
    </div>

    <!-- ── PENDIDIKAN ── -->
    <div class="glass section-card">
      <div class="section-label">
        <span class="label-icon"><i class="fa-solid fa-graduation-cap"></i></span>
        Pendidikan
      </div>
      <div class="edu-grid" id="edu-grid"></div>
    </div>

    <!-- ── AKTIVITAS (tabs) ── -->
    <div class="glass section-card">
      <div class="stats-bar" id="stats-bar"></div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('teaching',this)">
          <i class="fa-solid fa-chalkboard-user"></i>
          <span class="tab-text">Pengajaran</span>
        </button>
        <button class="tab-btn" onclick="switchTab('research',this)">
          <i class="fa-solid fa-book-open"></i>
          <span class="tab-text">Publikasi</span>
        </button>
        <button class="tab-btn" onclick="switchTab('service',this)">
          <i class="fa-solid fa-handshake-angle"></i>
          <span class="tab-text">Pengabdian</span>
        </button>
      </div>

      <div class="tab-pane active" id="tab-teaching"><div id="teaching-content"></div></div>
      <div class="tab-pane"        id="tab-research"><div class="pub-list" id="research-content"></div></div>
      <div class="tab-pane"        id="tab-service"> <div class="pub-list" id="service-content"></div></div>
    </div>

  </div><!-- /.page-wrap -->

  <script>
  /* ── Helpers ── */
  const $ = id => document.getElementById(id);

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    $('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  /* ── Load data ── */
  async function loadData() {
    try {
      const res  = await fetch('./data.json?t=' + Date.now());
      const data = await res.json();
      if (data.status !== 'success') throw new Error('Bad status');
      const p = data.profil;

      $('prof-name').textContent = p.nama || '—';
      $('prof-role').textContent = `Dosen – ${p.nama_prodi || ''}`;
      $('prof-chips').innerHTML = [
        { icon:'fa-university', text: p.nama_pt   || '' },
        { icon:'fa-id-badge',   text: 'NIDN ' + (p.nidn || '') },
        { icon:'fa-briefcase',  text: p.nama_prodi || '' },
      ].map(c=>`<span class="chip"><i class="fa-solid ${c.icon}"></i>${c.text}</span>`).join('');

      /* Education */
      const sorted = [...(data.pendidikan||[])].sort((a,b)=>+b.tahun - +a.tahun);
      $('edu-grid').innerHTML = sorted.map(e => {
        const prodi = (e.prodi && e.prodi!=='N/A')
          ? `<div class="edu-prodi"><i class="fa-solid fa-layer-group" style="font-size:.6rem;margin-right:4px;"></i>${e.prodi}</div>` : '';
        return `<div class="glass-card-item">
          <div class="edu-degree">${e.jenjang}</div>
          <div class="edu-uni">${e.pt}</div>${prodi}
          <div class="edu-year"><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>Lulus ${e.tahun}</div>
        </div>`;
      }).join('');

      /* Teaching */
      const tc = $('teaching-content');
      if (!data.mengajar||!data.mengajar.length) {
        tc.innerHTML='<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        tc.innerHTML = data.mengajar.map(kampus => {
          const courses=(kampus.mata_kuliah||[]).map(mk=>`
            <div class="glass-card-item">
              <div class="course-name">${mk.nama}</div>
              <div class="course-sem"><i class="fa-regular fa-calendar-check" style="margin-right:4px;"></i>${mk.semester}</div>
            </div>`).join('');
          return `<div class="campus-block">
            <div class="campus-label"><i class="fa-solid fa-landmark"></i>${kampus.nama_kampus}</div>
            <div class="course-grid">${courses}</div>
          </div>`;
        }).join('');
      }

      /* Publications + stats */
      const rc = $('research-content');
      if (!data.publikasi||!data.publikasi.length) {
        rc.innerHTML='<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        const totalSitasi    = data.publikasi.reduce((a,pub)=>{const n=parseInt(pub.sitasi||'0',10);return a+(isNaN(n)?0:n);},0);
        const totalPub       = data.publikasi.length;
        const totalMengajar  = (data.mengajar||[]).reduce((a,k)=>a+(k.mata_kuliah||[]).length,0);
        const totalPengabd   = (data.pengabdian||[]).length;

        $('stats-bar').innerHTML=[
          {icon:'fa-book-open',       num:totalPub,       label:'Publikasi'},
          {icon:'fa-star',            num:totalSitasi,    label:'Sitasi'},
          {icon:'fa-chalkboard-user', num:totalMengajar,  label:'Matkul'},
          {icon:'fa-handshake-angle', num:totalPengabd,   label:'Pengabdian'},
        ].map(s=>`<div class="stat-pill"><i class="fa-solid ${s.icon}"></i><span class="stat-num">${s.num}</span><span>${s.label}</span></div>`).join('');

        rc.innerHTML = data.publikasi.map(pub => {
          const titleInner = pub.link
            ? `<a href="${pub.link}" target="_blank">${pub.judul} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;margin-left:4px;opacity:.5;"></i></a>`
            : pub.judul;
          const sitasiNum=parseInt(pub.sitasi||'0',10);
          const citeBadge=sitasiNum>0
            ? `<span class="tag cite-badge"><i class="fa-solid fa-star" style="margin-right:3px;"></i>${sitasiNum} Sitasi</span>` : '';
          return `<div class="glass-card-item pub-item">
            <div class="pub-year-badge">${pub.tahun}</div>
            <div class="pub-body">
              <div class="pub-title">${titleInner}</div>
              <div class="pub-meta"><span class="tag">${pub.jenis}</span>${citeBadge}</div>
            </div>
          </div>`;
        }).join('');
      }

      /* Pengabdian */
      const sc=$('service-content');
      if (!data.pengabdian||!data.pengabdian.length) {
        sc.innerHTML='<p style="color:var(--text-muted);font-size:.85rem;">Tidak ada data.</p>';
      } else {
        sc.innerHTML=data.pengabdian.map(item=>`
          <div class="glass-card-item pub-item">
            <div class="pub-year-badge">${item.tahun}</div>
            <div class="pub-body">
              <div class="pub-title">${item.judul}</div>
              <div class="pub-meta">
                <span class="tag" style="color:#fbbf24;border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.09);">${item.kategori}</span>
              </div>
            </div>
          </div>`).join('');
      }

      /* Reveal */
      $('page-loader').classList.add('hidden');
      setTimeout(()=>$('page-loader').remove(), 500);
      const main=$('main-content');
      main.style.transition='opacity .55s ease';
      main.style.opacity='1';

    } catch(err) {
      console.error(err);
      $('page-loader').innerHTML=`<div style="text-align:center;">
        <i class="fa-solid fa-circle-exclamation" style="font-size:2.4rem;color:#ef4444;margin-bottom:12px;"></i>
        <p style="color:#ef4444;font-weight:700;">Gagal memuat data.<br>Pastikan data.json tersedia.</p>
      </div>`;
    }
  }

  /* ── Download PDF (unchanged) ── */
  async function downloadPDF() {
    const btn=$('btn-dl');
    if(btn.classList.contains('loading'))return;
    btn.classList.add('loading');
    btn.querySelector('span').textContent='Menyiapkan…';
    try {
      const res=await fetch('./cv.html');
      if(!res.ok)throw new Error('cv.html not found');
      const html=await res.text();
      const container=document.createElement('div');
      container.style.cssText='position:absolute;left:-9999px;top:0;width:210mm;';
      container.innerHTML=html;
      document.body.appendChild(container);
      await new Promise(r=>setTimeout(r,600));
      await html2pdf().set({
        margin:[0.5,0.5,0.5,0.5],
        filename:'CV_Vicky_Setia_Gunawan.pdf',
        image:{type:'jpeg',quality:0.98},
        html2canvas:{scale:2,useCORS:true,logging:false},
        jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
        pagebreak:{mode:['avoid-all','css']},
      }).from(container).save();
      document.body.removeChild(container);
    } catch(err) {
      console.error(err);
      alert('Gagal mengunduh CV. Pastikan file cv.html tersedia.');
    } finally {
      btn.classList.remove('loading');
      btn.querySelector('span').textContent='Unduh CV';
    }
  }

  window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
