name: Update Dosen Profile (OpenAlex)

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 👈 izin untuk push ke repositori
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 pddiktipy

      - name: Jalankan skrip
        env:
          NAMA_DOSEN: "VICKY SETIA GUNAWAN"
          NAMA_PT:    "UNIVERSITAS PERINTIS INDONESIA"
          PRODI:      "BISNIS DIGITAL"
          SCHOLAR_ID: "zxh3WngAAAAJ"
        run: python update_profile.py

      - uses: actions/upload-artifact@v4
        with:
          name: dosen-profile
          path: data.json

      - name: Commit & push jika ada perubahan
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || (git commit -m "Update profile data [skip ci]" && git push)
